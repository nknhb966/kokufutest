<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width">
<title>1越前国府VRコースター</title>
<style>
    *, *::before, *::after { box-sizing:border-box; }
    body { margin:0; overflow:hidden; font-family:'Helvetica Neue',Arial,sans-serif; background:#000; }

    /* ═══════════════════════════════════════════════
       フルスクリーン タイトルパネル
    ═══════════════════════════════════════════════ */
    #uiPanel {
        position:absolute; inset:0;
        display:flex; flex-direction:column; align-items:center; justify-content:center;
        background:
            radial-gradient(ellipse at 30% 20%, rgba(120,60,240,0.55) 0%, transparent 60%),
            radial-gradient(ellipse at 70% 80%, rgba(30,80,220,0.50) 0%, transparent 60%),
            linear-gradient(160deg, #04040f 0%, #0a0620 50%, #060818 100%);
        color:#fff; z-index:10;
        overflow-y:auto;
    }
    /* 背景粒子風装飾 */
    #uiPanel::before {
        content:''; position:absolute; inset:0; pointer-events:none;
        background:
            radial-gradient(circle 1px at 15% 25%, rgba(200,160,255,0.5) 0%, transparent 100%),
            radial-gradient(circle 1px at 80% 15%, rgba(160,200,255,0.4) 0%, transparent 100%),
            radial-gradient(circle 1px at 60% 70%, rgba(200,160,255,0.3) 0%, transparent 100%),
            radial-gradient(circle 2px at 40% 55%, rgba(100,180,255,0.3) 0%, transparent 100%);
    }

    .panel-inner {
        position:relative; z-index:1;
        width:min(680px,92vw);
        display:flex; flex-direction:column; align-items:center; gap:0;
    }

    /* タイトル */
    .main-title {
        font-size:clamp(28px,5vw,52px); font-weight:900; letter-spacing:3px;
        text-align:center; margin:0 0 8px;
        background:linear-gradient(90deg,#e0b0ff 0%,#90d0ff 45%,#e0b0ff 100%);
        -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
        filter:drop-shadow(0 0 18px rgba(180,120,255,0.7));
        animation:titleGlow 3s ease-in-out infinite alternate;
    }
    @keyframes titleGlow {
        from { filter:drop-shadow(0 0 14px rgba(180,120,255,0.5)); }
        to   { filter:drop-shadow(0 0 28px rgba(140,200,255,0.9)); }
    }
    .sub-title {
        font-size:clamp(14px,2.2vw,20px); color:rgba(200,185,255,0.80);
        letter-spacing:2px; margin:0 0 28px; text-align:center;
    }

    /* VR ボタンラッパー */
    #vrButtonWrap {
        width:100%; margin-bottom:22px;
    }
    #vrButtonWrap button, #vrButtonWrap a {
        display:block !important;
        position: static !important;
        width:100% !important;
        padding:18px 0 !important;
        font-size:clamp(16px,2.5vw,22px) !important;
        font-weight:800 !important;
        letter-spacing:1px !important;
        background:linear-gradient(135deg,#7c3aed,#1d4ed8) !important;
        color:#fff !important;
        border:none !important;
        border-radius:12px !important;
        cursor:pointer !important;
        text-decoration:none !important;
        box-shadow:0 0 32px rgba(120,80,255,0.7), inset 0 1px 0 rgba(255,255,255,0.15) !important;
        transition:box-shadow .2s, transform .1s !important;
    }
    #vrButtonWrap button:hover, #vrButtonWrap a:hover {
        box-shadow:0 0 48px rgba(120,80,255,0.95) !important; transform:translateY(-1px) !important;
    }

    /* 区切り線 */
    .divider {
        width:100%; height:1px;
        background:linear-gradient(90deg,transparent,rgba(180,140,255,0.4),transparent);
        margin:4px 0 18px;
    }

    /* 設定グリッド */
    .settings-grid {
        width:100%; display:grid;
        grid-template-columns:1fr 1fr;
        gap:12px; margin-bottom:16px;
    }
    .setting-card {
        background:rgba(255,255,255,0.05);
        border:1px solid rgba(180,140,255,0.2);
        border-radius:10px; padding:12px 14px;
    }
    .setting-label {
        font-size:11px; font-weight:700; letter-spacing:2px;
        color:rgba(180,160,255,0.65); text-transform:uppercase; margin-bottom:8px;
    }
    .toggle { display:flex; width:100%; }
    .toggle button {
        flex:1; border:none; padding:10px 6px;
        background:rgba(80,70,130,0.7); color:rgba(255,255,255,0.65);
        cursor:pointer; font-size:13px; font-weight:600;
        transition:background .15s, color .15s;
    }
    .toggle button:first-child { border-radius:7px 0 0 7px; }
    .toggle button:last-child  { border-radius:0 7px 7px 0; }
    .toggle button.active {
        background:linear-gradient(135deg,#7c3aed,#1d4ed8); color:#fff;
    }

    /* スピードカード（幅フル） */
    .setting-card.full { grid-column:1/-1; }
    .speed-row { display:flex; align-items:center; gap:10px; }
    input[type=range] { flex:1; accent-color:#a78bfa; height:4px; }
    #speedValue { font-size:15px; font-weight:700; color:#a78bfa; min-width:32px; text-align:right; }

    /* ボタン行 */
    .btn-row {
        width:100%; display:flex; gap:10px; margin-bottom:4px;
    }
    .action-btn {
        flex:1; padding:13px 0; font-size:clamp(13px,1.8vw,16px); font-weight:700;
        border:none; border-radius:9px; cursor:pointer; transition:opacity .15s, transform .1s;
    }
    .action-btn:hover { opacity:.85; transform:translateY(-1px); }
    .btn-help   { background:linear-gradient(135deg,#0f766e,#0891b2); color:#fff; }
    .btn-reset  { background:linear-gradient(135deg,#991b1b,#b45309); color:#fff; }

    /* ═══════════════════════════════════════════════
       モーダル（操作説明）
    ═══════════════════════════════════════════════ */
    #modal {
        display:none; position:fixed; inset:0; z-index:100;
        background:rgba(0,0,5,0.88);
        align-items:center; justify-content:center;
    }
    #modal.open { display:flex; }
    .modal-box {
        width:min(640px,90vw); max-height:80vh; overflow-y:auto;
        background:linear-gradient(150deg,#0d0820,#080d25);
        border:1px solid rgba(180,140,255,0.35);
        border-radius:16px; padding:28px 30px 24px;
        position:relative; color:#e8e0ff;
    }
    .modal-close {
        position:absolute; top:14px; right:18px;
        background:none; border:none; color:rgba(200,180,255,0.6);
        font-size:26px; cursor:pointer; line-height:1;
    }
    .modal-close:hover { color:#fff; }
    .modal-tabs {
        display:flex; gap:8px; margin-bottom:22px;
    }
    .modal-tab {
        flex:1; padding:11px 0; font-size:15px; font-weight:700;
        border:1px solid rgba(180,140,255,0.3); border-radius:8px;
        background:rgba(80,70,130,0.4); color:rgba(200,185,255,0.6);
        cursor:pointer; transition:all .15s;
    }
    .modal-tab.active {
        background:linear-gradient(135deg,#7c3aed,#1d4ed8);
        color:#fff; border-color:transparent;
    }
    .modal-content { font-size:15px; line-height:1.85; }
    .modal-content h3 {
        font-size:17px; color:#c4b5fd; margin:0 0 10px; font-weight:800;
    }
    .modal-content .tag {
        display:inline-block; background:rgba(120,80,255,0.3);
        border:1px solid rgba(180,140,255,0.4);
        border-radius:5px; padding:1px 8px; font-size:13px;
        margin:0 2px; color:#c4b5fd; font-weight:700;
    }
    .modal-content ul { margin:6px 0 14px; padding-left:20px; }
    .modal-content li { margin:4px 0; }
    .modal-nav {
        display:flex; align-items:center; justify-content:center;
        gap:16px; margin-top:20px;
    }
    .modal-nav button {
        background:rgba(100,80,180,0.5); border:1px solid rgba(180,140,255,0.3);
        color:#c4b5fd; border-radius:8px; padding:9px 18px;
        font-size:22px; cursor:pointer; transition:background .15s;
    }
    .modal-nav button:hover { background:rgba(120,90,200,0.7); }
    .modal-nav .mode-label {
        font-size:15px; font-weight:700; color:#a78bfa; min-width:120px; text-align:center;
    }

    /* ═══════════════════════════════════════════════
       outsideモード: ミニUI（左上 10%×10%領域）
    ═══════════════════════════════════════════════ */
    #miniUI {
        display:none;
        position:absolute; top:1vh; left:1vw;
        width:clamp(160px,18vw,220px);
        background:rgba(5,5,20,0.82);
        border:1px solid rgba(180,140,255,0.25);
        border-radius:8px; padding:8px 10px;
        z-index:10; color:#fff;
    }
    body.outside-mode #uiPanel { display:none; }
    body.outside-mode #miniUI  { display:block; }
    .mini-label { font-size:10px; color:rgba(180,160,255,0.6); letter-spacing:1px; margin-bottom:6px; }
    .mini-toggle { display:flex; width:100%; }
    .mini-toggle button {
        flex:1; border:none; padding:8px 4px;
        background:rgba(80,70,130,0.7); color:rgba(255,255,255,0.65);
        cursor:pointer; font-size:12px; font-weight:600;
    }
    .mini-toggle button:first-child { border-radius:5px 0 0 5px; }
    .mini-toggle button:last-child  { border-radius:0 5px 5px 0; }
    .mini-toggle button.active { background:linear-gradient(135deg,#7c3aed,#1d4ed8); color:#fff; }
</style>
</head>
<body>
<audio id="railSound" src="trolley_clatter.mp3" loop preload="auto"></audio>

<!-- ═══ フルスクリーン タイトルパネル（ride モード） ═══ -->
<div id="uiPanel">
  <div class="panel-inner">
    <p class="main-title">越前国府VRコースター</p>
    <p class="sub-title">〜体験と挑戦、ふたつの旅〜</p>

    <div id="vrButtonWrap"></div>

    <div class="divider"></div>

    <div class="settings-grid">
      <div class="setting-card">
        <div class="setting-label">カーブ</div>
        <div class="toggle" id="curveToggle">
          <button data-value="trolley">TROLLEY</button>
          <button data-value="coaster">COASTER</button>
        </div>
      </div>
      <div class="setting-card">
        <div class="setting-label">カメラ</div>
        <div class="toggle" id="cameraToggle">
          <button data-value="ride">RIDE</button>
          <button data-value="outside">OUTSIDE</button>
        </div>
      </div>
      <div class="setting-card full">
        <div class="setting-label">モード</div>
        <div class="toggle" id="gameModeToggle">

          <button data-value="tour">🚃 ツアー</button>

    <!-- ボタン行 -->
    <div class="btn-row">

</div>

<!-- ═══ outside モード用ミニUI ═══ -->
<div id="miniUI">
  <div class="mini-label">CAMERA</div>
  <div class="mini-toggle" id="miniCameraToggle">
    <button data-value="ride">RIDE</button>
    <button data-value="outside">OUTSIDE</button>
  </div>
</div>

<!-- ═══ 操作説明モーダル ═══ -->
<div id="modal">
  <div class="modal-box">
    <button class="modal-close" id="modalClose">×</button>
    <div class="modal-tabs">
      <button class="modal-tab active" data-mode="game">🎮 ゲームモード</button>
      <button class="modal-tab" data-mode="tour">🚃 ツアーモード</button>
      <button class="modal-tab" data-mode="learning">📚 学びモード</button>
    </div>
    <div class="modal-content" id="modalContent"></div>
    <div class="modal-nav">
      <button id="modalPrev">◀</button>
      <span class="mode-label" id="modalModeLabel">ゲームモード</span>
      <button id="modalNext">▶</button>
    </div>
  </div>
</div>

<script type="importmap">
{
    "imports":{
        "three":"https://code4fukui.github.io/three.js/build/three.module.js",
        "three/addons/":"https://code4fukui.github.io/three.js/examples/jsm/"
    }
}
</script>
<script type="module">
import * as THREE from "three";
import {Curve, addCoaster} from "https://code4fukui.github.io/vr-tojinbo/TojinboCoaster.js";
import {OrbitControls} from "three/addons/controls/OrbitControls.js";
import {VRButton} from "three/addons/webxr/VRButton.js";
import {GLTFLoader} from "three/addons/loaders/GLTFLoader.js";
import {XRControllerModelFactory} from "three/addons/webxr/XRControllerModelFactory.js";

/* =====================================================
CONSTANTS
===================================================== */
const MODEL_SCALE    = 5;
const ARTIFACT_SCALE = MODEL_SCALE;
const ARTIFACT_HEIGHT= 1.5 * MODEL_SCALE;
const RAIL_RADIUS    = 3.6 * MODEL_SCALE;
const RAIL_HEIGHT    = 1.7 * MODEL_SCALE;
const RAIL_OVAL      = 0.4;
const GAME_DURATION  = 60;
const LASER_MAX_DIST = 25;

/* =====================================================
CONFIG
===================================================== */
const CONFIG = {
    curve    : localStorage.getItem("curve")    || "trolley",
    camera   : "ride",
    speed    : parseFloat(localStorage.getItem("speed") || 0.5),
    gameMode : localStorage.getItem("gameMode") || "game"
};
let SPEED = CONFIG.speed;

/* =====================================================
SCORES
===================================================== */
const LS_KEY = "vr_coaster_scores_v2";
function loadScores() {
    try { return JSON.parse(localStorage.getItem(LS_KEY) || "[]"); } catch(e) { return []; }
}
function saveScore(score) {
    const arr = loadScores();
    arr.push({ score, date: new Date().toLocaleDateString("ja-JP") });
    arr.sort((a,b)=>b.score-a.score); arr.splice(5);
    localStorage.setItem(LS_KEY, JSON.stringify(arr));
}
document.getElementById("resetBtn").addEventListener("click", () => {
    if (confirm("記録をリセットしますか？")) {
        localStorage.removeItem(LS_KEY);
        updateScoreBoard();
    }
});

/* =====================================================
UI SETUP
===================================================== */
const railSound = document.getElementById("railSound");
railSound.pause();
railSound.volume = 0.6;

function setupToggle(id, key) {
    const btns = document.querySelectorAll(`#${id} button`);
    btns.forEach(btn => {
        if (btn.dataset.value === CONFIG[key]) btn.classList.add("active");
        btn.onclick = () => {
            btns.forEach(b=>b.classList.remove("active")); btn.classList.add("active");
            localStorage.setItem(key, btn.dataset.value); location.reload();
        };
    });
}

function setupCameraToggle(id) {
    const btns = document.querySelectorAll(`#${id} button`);
    btns.forEach(btn => {
        if (btn.dataset.value === CONFIG.camera) btn.classList.add("active");
        btn.onclick = () => {
            btns.forEach(b=>b.classList.remove("active")); btn.classList.add("active");
            location.reload();
            sessionStorage.setItem("camera_tmp", btn.dataset.value);
        };
    });
}

{
    const tmp = sessionStorage.getItem("camera_tmp");
    if(tmp){ CONFIG.camera = tmp; sessionStorage.removeItem("camera_tmp");
        if(tmp==="outside") document.body.classList.add("outside-mode");
        else document.body.classList.remove("outside-mode");
    }
}
{
    const CURVE_DEFAULT_SPEED = { trolley: 0.5, coaster: 1.5 };
    const btns = document.querySelectorAll("#curveToggle button");
    btns.forEach(btn => {
        if (btn.dataset.value === CONFIG.curve) btn.classList.add("active");
        btn.onclick = () => {
            btns.forEach(b => b.classList.remove("active")); btn.classList.add("active");
            const newCurve = btn.dataset.value;
            localStorage.setItem("curve", newCurve);
            const defaultSpeed = CURVE_DEFAULT_SPEED[newCurve] ?? 1.0;
            localStorage.setItem("speed", defaultSpeed);
            location.reload();
        };
    });
}
setupCameraToggle("cameraToggle");
setupToggle("gameModeToggle","gameMode");

setupCameraToggle("miniCameraToggle");

const speedSlider  = document.getElementById("speedSlider");
const speedValueEl = document.getElementById("speedValue");
const realSpeedUI  = null;
speedSlider.value = SPEED;
speedValueEl.textContent = SPEED.toFixed(1);
speedSlider.oninput = () => {
    SPEED = parseFloat(speedSlider.value);
    speedValueEl.textContent = SPEED.toFixed(1);
    localStorage.setItem("speed", SPEED);
};

const MODAL_MODES = ["game","tour","learning"];
let modalModeIdx = MODAL_MODES.indexOf(CONFIG.gameMode);
if (modalModeIdx < 0) modalModeIdx = 0;

const MODAL_TEXT = {
    game: `
        <h3>🎮 ゲームモード</h3>
        <p>制限時間 <strong>60秒</strong> 以内に、レール沿いに浮かぶ
        <span class="tag">黄色い球</span> をできるだけ多く撃ちましょう！</p>
        <h3 style="margin-top:14px">📊 得点</h3>
        <ul>
          <li>初回クリック：<strong>+5pt</strong></li>
          <li>同じ球を再クリック：<strong>+1pt</strong></li>
          <li>全モデル コンプリート：<strong>+50pt ボーナス🎊</strong></li>
        </ul>
        <h3>🕹 VR コントローラー操作</h3>
        <ul>
          <li>右スティック ↑↓：加速 / 減速</li>
          <li>右トリガー：右レーザーで球を撃つ</li>
          <li>左トリガー：左レーザーで球を撃つ</li>
          <li><span class="tag">A</span> ボタン（右）：ゲームスタート</li>
          <li><span class="tag">B</span> ボタン（右）：強制終了</li>
        </ul>`,
    tour: `
        <h3>🚃 ツアーモード</h3>
        <p>制限時間なし。遺跡の発掘モデルを眺めながら<br>
        レール上をのんびり走り回れます。</p>
        <h3 style="margin-top:14px">🕹 VR コントローラー操作</h3>
        <ul>
          <li>右スティック ↑：加速</li>
          <li>右スティック ↓：減速</li>
        </ul>
        <p style="margin-top:10px;color:rgba(200,185,255,0.7);font-size:13px">
        ※ レーザー・クリック・得点は無効です。<br>
        ※ すべての発掘モデルが最初から表示されます。</p>`,
    learning: `
        <h3>📚 学びモード</h3>
        <p>レール上を移動しながら<span class="tag">青い球</span>をクリックして発掘！<br>
        全8モデルを発掘するまでの時間を競うタイムアタックです。</p>
        <h3 style="margin-top:14px">🔵 球の状態</h3>
        <ul>
          <li><strong style="color:#4488ff">青</strong>：未発掘（クリックで蓄積）</li>
          <li><strong style="color:#ffee00">黄</strong>：発掘待ち（もうすぐ！）</li>
          <li><strong style="color:#ff4444">赤</strong>：発掘済み</li>
        </ul>
        <h3>⛏ 発掘方法</h3>
        <ul>
          <li>球を <strong>20回</strong> クリックで発掘演出スタート</li>
          <li>演出中は列車が停止・時間も停止</li>
          <li>説明パネルの <strong>GO</strong> ボタンを押して次へ</li>
        </ul>
        <h3>🕹 VR コントローラー操作</h3>
        <ul>
          <li>右スティック ↑↓：加速 / 減速</li>
          <li>右/左トリガー：球をクリック</li>
          <li><span class="tag">A</span> ボタン（右）：スタート</li>
        </ul>`
};

function renderModal() {
    const mode = MODAL_MODES[modalModeIdx];
    document.getElementById("modalContent").innerHTML = MODAL_TEXT[mode];
    document.getElementById("modalModeLabel").textContent =
        mode === "game" ? "ゲームモード" : mode === "tour" ? "ツアーモード" : "学びモード";
    document.querySelectorAll(".modal-tab").forEach(t => {
        t.classList.toggle("active", t.dataset.mode === mode);
    });
}
renderModal();

document.getElementById("helpBtn").onclick = () => {
    document.getElementById("modal").classList.add("open");
    renderModal();
};
document.getElementById("modalClose").onclick = () =>
    document.getElementById("modal").classList.remove("open");
document.getElementById("modal").addEventListener("click", e => {
    if (e.target === document.getElementById("modal"))
        document.getElementById("modal").classList.remove("open");
});
document.getElementById("modalPrev").onclick = () => {
    modalModeIdx = (modalModeIdx - 1 + MODAL_MODES.length) % MODAL_MODES.length;
    renderModal();
};
document.getElementById("modalNext").onclick = () => {
    modalModeIdx = (modalModeIdx + 1) % MODAL_MODES.length;
    renderModal();
};
document.querySelectorAll(".modal-tab").forEach(tab => {
    tab.onclick = () => {
        modalModeIdx = MODAL_MODES.indexOf(tab.dataset.mode);
        renderModal();
    };
});

/* =====================================================
WEB AUDIO — synthesised SFX
===================================================== */
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function sfxClick() {
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.connect(g); g.connect(audioCtx.destination);
    o.type = "sine"; o.frequency.setValueAtTime(880, audioCtx.currentTime);
    o.frequency.exponentialRampToValueAtTime(1760, audioCtx.currentTime + 0.04);
    g.gain.setValueAtTime(0.6, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.18);
    o.start(); o.stop(audioCtx.currentTime + 0.18);
}

function sfxCountdown(n) {
    // n=1,2,3
    if (n > 0) {
        const o = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        o.connect(g); g.connect(audioCtx.destination);
        o.type = "square";
        const freq = 220 + (4 - n) * 110;
        o.frequency.setValueAtTime(freq, audioCtx.currentTime);
        g.gain.setValueAtTime(0.3, audioCtx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.25);

function makeLaser() {
    const mat = new THREE.LineBasicMaterial({ color:0xff2222, depthTest:false, transparent:true, opacity:0.95 });
    const geo = new THREE.BufferGeometry().setFromPoints([
        new THREE.Vector3(0,0,0), new THREE.Vector3(0,0,-LASER_MAX_DIST)
    ]);
    const line = new THREE.Line(geo, mat);
    line.frustumCulled = false; line.renderOrder = 9999;
    const dot = new THREE.Mesh(
        new THREE.SphereGeometry(0.012, 8, 8),
        new THREE.MeshBasicMaterial({ color:0xffffff, depthTest:false })
    );
    dot.renderOrder = 9999; dot.visible = false;
    line.add(dot);
    return { line, mat, dot };
}

let leftController  = null;

function onControllerConnected(event) {
    const ctrl = event.target;
    const hand = event.data.handedness;
    if (hand === "right") {
        rightController = ctrl;
        if (laserRight.line.parent) laserRight.line.parent.remove(laserRight.line);
        ctrl.add(laserRight.line);
    } else if (hand === "left") {
        leftController = ctrl;
        if (laserLeft.line.parent) laserLeft.line.parent.remove(laserLeft.line);
        ctrl.add(laserLeft.line);
    }
}

function onControllerDisconnected(event) {
    const ctrl = event.target;
    if (ctrl === rightController) rightController = null;
    if (ctrl === leftController)  leftController  = null;
}

function rrect(ctx,x,y,w,h,r){
    ctx.beginPath();
    ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.arcTo(x+w,y,x+w,y+r,r);
    ctx.lineTo(x+w,y+h-r);ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
    ctx.lineTo(x+r,y+h);ctx.arcTo(x,y+h,x,y+h-r,r);
    ctx.lineTo(x,y+r);ctx.arcTo(x,y,x+r,y,r);ctx.closePath();
}

function loadLearningScores(){
    try{ return JSON.parse(localStorage.getItem(LS_LEARNING_KEY)||"[]"); }catch(e){return [];}
}
function saveLearningScore(timeMs){
    const arr = loadLearningScores();
    arr.push({time: timeMs, date: new Date().toLocaleDateString("ja-JP")});
    arr.sort((a,b)=>a.time-b.time); arr.splice(5);
    localStorage.setItem(LS_LEARNING_KEY, JSON.stringify(arr));
}

function learnElapsedMs(){
    // learnTimerPaused = accumulated running time (ms)
    // learnTimerStart  = performance.now() when last resumed
    // learnPauseStart  = non-zero while paused
    if(learnPauseStart > 0){
        // currently paused: return accumulated only
        return learnTimerPaused;
    }
    if(learnTimerStart === 0) return 0;
    return learnTimerPaused + (performance.now() - learnTimerStart);
}

function learnTimerPause(){
    if(learnPauseStart === 0 && learnTimerStart > 0){
        // accumulate running time so far
        learnTimerPaused += performance.now() - learnTimerStart;
        learnTimerStart = 0;
        learnPauseStart = performance.now();
    }
}
function learnTimerResume(){
    if(learnPauseStart > 0){
        learnPauseStart = 0;
        learnTimerStart = performance.now();
    }
}

    const elapsed = learnElapsedMs();
    const secs = (elapsed/1000).toFixed(1);

    ctx.fillStyle="#44ddff"; ctx.font="bold 64px sans-serif"; ctx.textAlign="left";
    ctx.fillText("📚 LEARNING",40,88);

// Initialize sphere states for learning mode
function initLearnSpheres(){
    ARTIFACTS.forEach((_,i)=>{
        learnSphereState[i] = {state:"idle", count:0};
        const sph = clickSpheres[i];
        sph.material.color.set(0x2266ff);
        sph.material.opacity = 0.82;
        sph.scale.setScalar(1.0);
    });
    learnExcavQueue.length = 0;
    learnIsExcavating = false;
    learnDoneCount = 0;
    learningSubState = "exploring";
}

// Visual update for a sphere based on its learn state
function updateLearnSphereVisual(idx, now){
    const s = learnSphereState[idx];
    const sph = clickSpheres[idx];
    if(!s||!sph) return;
    if(s.state==="done"){
        sph.visible = false; return;
    }
    if(s.state==="ready"){
        // 高速点滅 黄
        const t = (now*0.008)%1;
        sph.material.color.set(0xffee00);
        sph.material.opacity = 0.5 + 0.5*(t>0.5?1:0);
        return;
    }
    if(s.state==="accumulating"){
        // 青 → 緑寄りに変化、スケール
        const ratio = s.count / 20;
        const r = Math.round(0x22 + (0x00-0x22)*ratio);
        const g2 = Math.round(0x66 + (0xcc-0x66)*ratio);
        const b = Math.round(0xff + (0x44-0xff)*ratio);
        sph.material.color.setRGB(r/255, g2/255, b/255);
        sph.scale.setScalar(1.0 + 0.1*ratio);
        sph.material.opacity = 0.82;
        return;
    }
    // idle: 青・弱グロー・ゆっくり点滅
    const p = 0.7 + 0.3*Math.sin(now*0.002 + idx*0.8);
    sph.material.color.set(0x2266ff);
    sph.material.opacity = p * 0.82;
}

// Called when sphere reaches 20 clicks
function onLearnSphereReady(idx){
    learnSphereState[idx].state = "ready";
    learnExcavQueue.push(idx);
    sfxLearningReady();
    vibrate(250, 1.0);
    // Try to process queue
    processLearnQueue();
}

// Process excavation queue (FIFO, one at a time)
function processLearnQueue(){
    if(learnIsExcavating) return;
    if(learnExcavQueue.length===0) return;
    const idx = learnExcavQueue.shift();
    startLearnExcavation(idx);
}

function getExcavModelTarget(){

function startLearnExcavation(idx){
    learnIsExcavating = true;
    learnExcavIdx = idx;
    learnExcavStep = 0;
    learnExcavT = 0;
    learningSubState = "excavating";

    // ⑤ 演出中はレール音停止
    railSound.pause();

    // Pause timer
    learnTimerPause();

    // Darken scene
    setDark(0.68);
    sfxLearningExcavate();
    vibrate(200, 0.8);

    // Grab the permanent model and move it
    const model = permanentModels[idx];
    if(model){
        learnExcavModel = model;
        learnExcavOrigPos = model.position.clone();
        model.visible = true;
        // ⑩ renderOrder: モデルをパネルより前面に
        model.traverse(c=>{
            if(c.isMesh){
                c.renderOrder=1003;
                c.material = c.material.clone();
                c.material.depthTest=false;
            }
        });
    }

    // Show excavation panel (loading state)
    drawExcavPanel(idx, false);
    GOBT.mesh.visible = false;
    learnGoReady = false;
    learnGoButton.mesh.visible = false;

    // Hide the sphere
    clickSpheres[idx].visible = false;

    learnExcavFlyT = 0;
    learnExcavStep = 1; // animate model to front
}

// Called each frame during excavation
let learnExcavPhase = 0; // 0=fly-in, 1=showing, 2=fly-out
let learnExcavFlyT = 0;
let learnExcavShowTimer = 0;
let learnExcavGoPressed = false;
let learnExcavModelLocalPos = new THREE.Vector3();
let learnExcavModelWorldStart = new THREE.Vector3();

function tickLearnExcavation(dt){
    if(!learnIsExcavating) return;
    const idx = learnExcavIdx;
    const model = learnExcavModel;

    if(learnExcavStep===1){
        // Fly model from world pos to train-local front (in world space)
        if(learnExcavFlyT === 0 && model){
            model.userData._flyStart = model.position.clone();
        }
        learnExcavFlyT += dt;
        const dur = 1.0;
        const t = Math.min(learnExcavFlyT/dur,1);
        const ease = t<0.5?2*t*t:1-Math.pow(-2*t+2,2)/2;

        if(model){
            // Convert target (local to train) to world each frame (train moves)
            const targetLocal = getExcavModelTarget();
            const targetWorld = targetLocal.clone().applyMatrix4(train.matrixWorld);
            const startWorld = model.userData._flyStart || model.position;
            model.position.lerpVectors(startWorld, targetWorld, ease);
            model.rotation.z += dt * (2*Math.PI*3); // ~3 turns/sec
            const sc = ARTIFACT_SCALE * (0.5 + 0.5*ease);
            model.scale.setScalar(sc);
        }

        if(t>=1){
            learnExcavStep=2;
            learnExcavShowTimer=0;
        }
        return;
    }

    if(learnExcavStep===2){
        // Waiting 0.5s then show description image
        learnExcavShowTimer += dt;
        if(learnExcavShowTimer >= 0.5 && !learnGoReady){
            drawExcavPanel(idx, true);
            learnGoReady = true;
            GOBT.mesh.visible = true;
        }
        // Blink GO button
        if(learnGoReady){
            const blink = Math.floor(performance.now()*0.004)%2===0;
            drawGoButton(blink);
        }
        // ③C: Y軸回転のみ、3秒で1回転 = 2π/3 rad/sec
        if(model) model.rotation.y += dt * (2*Math.PI/3);
        // Wait for GO
        return;
    }

    if(learnExcavStep===3){
        // Fly model back to sphere position (world)
        if(learnExcavFlyT === 0 && model){
            model.userData._flyStart = model.position.clone();
        }
        learnExcavFlyT += dt;
        const dur = 0.8;
        const t = Math.min(learnExcavFlyT/dur,1);
        const ease = t<0.5?2*t*t:1-Math.pow(-2*t+2,2)/2;

        if(model){
            const targetWorld = artifactWorldPos[idx] || learnExcavOrigPos;
            const fs = model.userData._flyStart || model.position;
            model.position.lerpVectors(fs, targetWorld, ease);
            model.rotation.y += dt * 0.5;
            const sc = ARTIFACT_SCALE * (0.5 + 0.5*ease);
            model.scale.setScalar(Math.max(ARTIFACT_SCALE*0.5, sc));
        }

        if(t>=1){
            // Finalize
            if(model){
                model.position.copy(artifactWorldPos[idx]);
                model.scale.setScalar(ARTIFACT_SCALE);
                model.visible = true;
            }
            finishLearnExcavation(idx);
        }
        return;
    }
}

function onLearnGoPressed(){
    if(!learnGoReady || !learnIsExcavating) return;
    sfxLearningGo();
    vibrate(150, 0.6);
    learnGoReady = false;
    GOBT.mesh.visible = false;
    EXP.mesh.visible = false;
    const idx = learnExcavIdx;
    if(learnExcavImageMesh[idx]) learnExcavImageMesh[idx].visible = false;
    learnExcavFlyT = 0;
    learnExcavStep = 3;
}

function finishLearnExcavation(idx){
    learnSphereState[idx].state = "done";
    learnDoneCount++;

    // ② 発掘完了 → シーン説明パネル・ライン表示
    if(learnScenePanels[idx]) learnScenePanels[idx].visible = true;
    if(learnSceneLines[idx])  learnSceneLines[idx].visible  = true;

    // 発掘演出用画像パネルを非表示
    if(learnExcavImageMesh[idx]) learnExcavImageMesh[idx].visible = false;

    // ⑩ renderOrder復元
    const model = permanentModels[idx];
    if(model){
        model.traverse(c=>{
            if(c.isMesh){
                c.renderOrder=0;
                c.material.depthTest=true;
            }
        });
        model.position.copy(artifactWorldPos[idx]);
        model.scale.setScalar(ARTIFACT_SCALE);
        model.visible = true;
    }

    // Add to hand models (attached to train)
    addHandModel(idx, learnDoneCount-1);

    // Mark sphere as done
    clickSpheres[idx].visible = false;

    // Resume train
    setDark(0);
    learnTimerResume();
    learningSubState = "exploring";
    learnIsExcavating = false;
    learnExcavModel = null;

    // ⑤ 演出終了 → レール音再開
    if(gamePhase==="playing") railSound.play().catch(()=>{});

    // Process next in queue
    setTimeout(()=>processLearnQueue(), 300);

    // Check completion
    if(learnDoneCount >= ARTIFACTS.length){
        setTimeout(()=>onLearnComplete(), 400);
    }
}

// Hand models attached to train
const handModelGroup = new THREE.Group();
train.add(handModelGroup);

function addHandModel(idx, slot){
    const model = permanentModels[idx];
    if(!model) return;
    // Clone for hand display
    const clone = model.clone();
    const total = ARTIFACTS.length;
    const spacing = 0.8 / (total-1);
    const xPos = -0.4 + slot * spacing;
    clone.position.set(xPos, 0.22, -0.78);
    clone.scale.setScalar(ARTIFACT_SCALE * 0.065);
    clone.rotation.set(0,0,0);
    clone.visible = true;
    clone.traverse(c=>{if(c.isMesh)c.frustumCulled=false;});
    handModelGroup.add(clone);
    learnHandModels.push({mesh:clone, slot});
}

    sfxLearningComplete();
    setDark(0.75);
    railSound.pause();
    saveLearningScore(elapsed);

function showLearnResult(elapsed){
    // Show result on EXP panel (reuse)
    const {ctx,tex}=EXP;
    ctx.clearRect(0,0,1024,768);
    ctx.fillStyle="rgba(0,5,20,0.95)"; rrect(ctx,8,8,1008,752,32); ctx.fill();
    ctx.strokeStyle="rgba(255,220,60,0.8)"; ctx.lineWidth=8; rrect(ctx,8,8,1008,752,32); ctx.stroke();

    ctx.fillStyle="#ffee44"; ctx.font="bold 70px sans-serif"; ctx.textAlign="center";
    ctx.fillText("🎊 全発掘コンプリート！",512,100);

    ctx.fillStyle="#ffffff"; ctx.font="bold 50px sans-serif";
    ctx.fillText("⏱ TIME",512,185);
    ctx.fillStyle="#44ffcc"; ctx.font="bold 130px sans-serif";
    ctx.fillText(`${(elapsed/1000).toFixed(1)}s`,512,330);

    ctx.strokeStyle="rgba(68,200,255,0.4)"; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(60,365); ctx.lineTo(964,365); ctx.stroke();

    ctx.fillStyle="#ffcc44"; ctx.font="bold 52px sans-serif";
    ctx.fillText("🏆 TOP 5",512,430);

    const scores = loadLearningScores();
    const medals=["🥇","🥈","🥉","4.","5."];
    scores.slice(0,5).forEach((s,i)=>{
        const y=490+i*52;
        const isNew = Math.abs(s.time-elapsed)<10;
        ctx.fillStyle=isNew?"#44ffcc":i===0?"#ffd700":i===1?"#c0c0c0":"#88ccff";
        ctx.font=`bold 40px sans-serif`; ctx.textAlign="left";
        ctx.fillText(`${medals[i]} ${(s.time/1000).toFixed(1)}s${isNew?" ← NEW":""}`,80,y);
    });
    tex.needsUpdate=true;
    EXP.mesh.visible=true;

    // Auto reset after 12s
    phaseTimeout = setTimeout(()=>{
        resetLearningMode();
    },12000);
}

function resetLearningMode(){
    clearTimers();
    EXP.mesh.visible=false;
    GOBT.mesh.visible=false;
    // 発掘演出用画像パネルを全非表示
    ARTIFACTS.forEach((_,i)=>{
        if(learnExcavImageMesh[i]) learnExcavImageMesh[i].visible=false;
    });
    setDark(0);
    gamePhase="idle";
    learningSubState="exploring";
    learnTimerStart=0; learnTimerPaused=0; learnPauseStart=0;
    learnExcavStep=0; learnIsExcavating=false;
    learnGoReady=false;
    learnExcavFlyT=0;
    learnExcavIdx=-1;
    // Remove hand models
    learnHandModels.forEach(h=>handModelGroup.remove(h.mesh));
    learnHandModels.length=0;
    // Re-init spheres
    initLearnSpheres();
    // Restore sphere visibility
    clickSpheres.forEach(s=>{ s.visible=true; });
    // Hide permanent models & restore renderOrder
    ARTIFACTS.forEach((_,i)=>{
        if(permanentModels[i]){
            permanentModels[i].visible=false;
            permanentModels[i].traverse(c=>{
                if(c.isMesh){ c.renderOrder=0; c.material.depthTest=true; }
            });
        }
    });
    // ① シーン説明パネル・ライン再非表示
    ARTIFACTS.forEach((_,i)=>{
        if(learnScenePanels[i]) learnScenePanels[i].visible=false;
        if(learnSceneLines[i])  learnSceneLines[i].visible=false;
    });
    updateLearnHUD();
    updateLearnScoreBoard();
}

function startLearningMode(){
    if(gamePhase!=="idle") return;
    gamePhase="countdown";
    learningSubState="exploring";
    learnDoneCount=0;
    initLearnSpheres();
    teleportToStart();
    setDark(0);
    vibrate(120,0.5);
    updateLearnHUD();

    // ⑨ 3→2→1→GO カウントダウン
    let cd=3;
    function tick(){
        if(cd>0){
            sfxCountdown(cd);
            showOverlay(String(cd),"準備！");
            cd--; phaseTimeout=setTimeout(tick,1000);
        } else {
            hideOverlay();
            // GO → 本番開始
            sfxCountdown(0);
            showOverlay("GO！");
            setTimeout(()=>{
                hideOverlay();
                gamePhase="playing";
                learnTimerStart=performance.now();
                learnTimerPaused=0; learnPauseStart=0;
                vibrate(300,0.7);
                railSound.play().catch(()=>{});
                updateLearnHUD();
            },700);
        }
    }
    sfxCountdown(cd);
    showOverlay(String(cd),"準備！"); cd=2;
    phaseTimeout=setTimeout(tick,1000);
}
function onLearnSphereClick(sphere){
    if(gamePhase!=="playing") return;
    if(learningSubState==="excavating"){
        sfxLearningBlock();
        sphere.material.color.set(0xff8800);
        setTimeout(()=>{
            const idx=sphere.userData.artifactIndex;
            const st=learnSphereState[idx]?.state;
            // restore color based on state
            if(st==="ready") sphere.material.color.set(0xffee00);
            else sphere.material.color.set(0x2266ff);
        },120);
        return;
    }
    const idx=sphere.userData.artifactIndex;
    const ls=learnSphereState[idx];
    if(!ls||ls.state==="done"||ls.state==="ready") return;

    ls.count++;
    ls.state="accumulating";
    sfxLearningClick(ls.count);
    const intensity = 0.2 + 0.8*(ls.count/20);
    vibrate(60, intensity);

    if(ls.count>=20){
        onLearnSphereReady(idx);
    }
}

function updateHUD(){
    const {ctx,tex}=HUD;
    ctx.clearRect(0,0,1024,512);
    ctx.fillStyle="rgba(0,0,0,0.78)"; rrect(ctx,8,8,1008,496,28); ctx.fill();
    ctx.fillStyle="#ffee44"; ctx.font="bold 64px sans-serif"; ctx.textAlign="left";
    ctx.fillText("SCORE",40,88);
    ctx.fillStyle="white"; ctx.font="bold 168px sans-serif";
    ctx.fillText(String(gameScore),40,256);
    const ratio=gameTimeLeft/GAME_DURATION;
    const bc=ratio>0.4?"#44ee88":ratio>0.2?"#ffcc22":"#ff4444";
    ctx.fillStyle=bc; ctx.font="bold 54px sans-serif"; ctx.textAlign="right";
    ctx.fillText(`⏱ ${gameTimeLeft}s`,984,340);
    ctx.fillStyle="rgba(255,255,255,0.15)"; ctx.fillRect(40,370,944,38);
    ctx.fillStyle=bc; ctx.fillRect(40,370,Math.max(0,944*ratio),38);
    if(gamePhase==="idle"){
        ctx.fillStyle="#88ffcc"; ctx.font="bold 34px sans-serif"; ctx.textAlign="center";
        ctx.fillText("Aボタン: スタート  Bボタン: 強制終了",512,468);
    }
    tex.needsUpdate=true;
}
function updateScoreBoard(){
    const {ctx,tex}=SB;
    ctx.clearRect(0,0,1024,1024);
    ctx.fillStyle="rgba(0,0,0,0.78)"; rrect(ctx,8,8,1008,1008,28); ctx.fill();
    ctx.fillStyle="#ffcc44"; ctx.font="bold 72px sans-serif"; ctx.textAlign="center";
    ctx.fillText("🏆 TOP 5",512,88);
    ctx.strokeStyle="rgba(255,204,68,0.4)"; ctx.lineWidth=3;
    ctx.beginPath(); ctx.moveTo(60,115); ctx.lineTo(964,115); ctx.stroke();
    const scores=loadScores();
    if(!scores.length){
        ctx.fillStyle="#aaa"; ctx.font="50px sans-serif"; ctx.fillText("記録なし",512,280);
    } else {
        const medals=["🥇","🥈","🥉","4.","5."];
        scores.forEach((s,i)=>{
            const y=185+i*162;
            ctx.fillStyle=i===0?"#ffd700":i===1?"#c0c0c0":i===2?"#cd7f32":"#88ccff";
            ctx.font=`bold ${i===0?72:60}px sans-serif`; ctx.textAlign="left";
            ctx.fillText(`${medals[i]} ${s.score}pt`,60,y);
            ctx.fillStyle="#777"; ctx.font="36px sans-serif"; ctx.textAlign="right";
            ctx.fillText(s.date,964,y);
        });
    }
    tex.needsUpdate=true;
}
function showOverlay(big,small=""){
    const {ctx,tex}=OV;
    ctx.clearRect(0,0,1024,512);
    ctx.fillStyle="rgba(0,0,0,0.90)"; rrect(ctx,10,10,1004,492,40); ctx.fill();
    ctx.strokeStyle="rgba(255,220,50,0.8)"; ctx.lineWidth=8; rrect(ctx,10,10,1004,492,40); ctx.stroke();
    ctx.fillStyle="white"; ctx.textAlign="center";
    if(small){
        ctx.font="bold 180px sans-serif"; ctx.fillText(big,512,285);
        ctx.fillStyle="#ffee44"; ctx.font="bold 60px sans-serif"; ctx.fillText(small,512,400);
    } else {
        ctx.font="bold 220px sans-serif"; ctx.fillText(big,512,330);
    }
    tex.needsUpdate=true; OV.mesh.visible=true;
}
function hideOverlay(){ OV.mesh.visible=false; }
updateHUD(); updateScoreBoard();

/* =====================================================
VIBRATION
===================================================== */
function vibrate(dur,intensity){
    const session=renderer.xr.getSession(); if(!session) return;
    for(const src of session.inputSources){
        if(src.handedness==="right"&&src.gamepad){
            const a=src.gamepad.hapticActuators;
            if(a&&a.length>0) a[0].pulse(intensity,dur);
        }
    }
}

/* =====================================================
GAME LOGIC
===================================================== */
let progress=0, velocity=0.0001;

function teleportToStart(){
    progress=0; velocity=0.0001;
    const p=curve.getPointAt(0).clone(); p.y+=0.2;
    train.position.copy(p);
    // ⑧ train rotation初期化
    const tan0=curve.getTangentAt(0);
    const lk=p.clone().sub(tan0);
    train.lookAt(lk);
}

// ⑦ 学びモード強制終了
function doLearnForceEnd(){
    if(CONFIG.gameMode!=="learning") return;
    if(gamePhase==="idle"||gamePhase==="result") return;
    clearTimers();
    vibrate(200,0.8);
    learnTimerPause();
    railSound.pause();
    // 発掘中パネルを閉じる
    EXP.mesh.visible=false;
    GOBT.mesh.visible=false;
    const idx=learnExcavIdx;
    if(idx>=0&&learnExcavImageMesh[idx]) learnExcavImageMesh[idx].visible=false;
    setDark(0.75);
    // OVオーバーレイ（ゲームモードと共用）
    showOverlay("強制終了","スコアは記録されません");
    phaseTimeout=setTimeout(()=>{
        hideOverlay();
        resetLearningMode();
    },3000);
}

function startCountdown(){
    if(gamePhase!=="idle") return;
    clearTimers();
    vibrate(120,0.5);
    gamePhase="countdown";
    gameScore=0; gameTimeLeft=GAME_DURATION;
    for(const k in clickCounts) delete clickCounts[k];
    teleportToStart(); setDark(0);
    updateHUD();

    let cd=3;
    function tick(){
        if(cd>0){
            sfxCountdown(cd);
            showOverlay(String(cd),"準備！");
            cd--; phaseTimeout=setTimeout(tick,1000);
        } else { hideOverlay(); doStart(); }
    }
    sfxCountdown(cd);
    showOverlay(String(cd),"準備！"); cd=2;
    phaseTimeout=setTimeout(tick,1000);
}

function doStart(){
    gamePhase="playing";
    sfxCountdown(0);
    updateHUD();
    vibrate(300,0.7);
    railSound.play().catch(()=>{});
    mainInterval=setInterval(()=>{
        gameTimeLeft--;
        updateHUD();
        if(gameTimeLeft<=0){ clearInterval(mainInterval); mainInterval=null; doEnd(); }
    },1000);
}

function doEnd(){
    clearTimers();
    gamePhase="result";
    sfxTimeUp();
    vibrate(600,1.0);
    railSound.pause();
    if(gameScore>0) saveScore(gameScore);
    updateScoreBoard(); setDark(0.75);
    showOverlay(`${gameScore}pt`,"🎉 ゲーム終了！");
    cleanCoins();
    phaseTimeout=setTimeout(()=>{
        gamePhase="idle"; gameScore=0; gameTimeLeft=GAME_DURATION;
        setDark(0); hideOverlay(); teleportToStart(); updateHUD();
    },10000);
}

function doForceEnd(){
    if(gamePhase!=="playing"&&gamePhase!=="countdown") return;
    clearTimers();
    vibrate(200,0.8);
    gamePhase="forceend";
    railSound.pause();
    cleanCoins(); setDark(0.75);
    showOverlay("強制終了","スコアは記録されません");
    phaseTimeout=setTimeout(()=>{
        gamePhase="idle"; gameScore=0; gameTimeLeft=GAME_DURATION;
        setDark(0); hideOverlay(); teleportToStart(); updateHUD();
    },3000);
}

/* =====================================================
COIN ANIMATIONS
===================================================== */
const coinAnims=[];
function cleanCoins(){ coinAnims.forEach(c=>{ if(c.mesh) scene.remove(c.mesh); }); coinAnims.length=0; }

function spawnCoin(idx,isFirst){
    const sp=artifactWorldPos[idx]; if(!sp) return;
    loader.load(BASE_URL+ARTIFACTS[idx].file,gltf=>{
        const coin=gltf.scene;
        coin.scale.set(ARTIFACT_SCALE*0.7,ARTIFACT_SCALE*0.7,ARTIFACT_SCALE*0.7);
        coin.position.copy(sp); scene.add(coin);
        if(isFirst){
            coinAnims.push({mesh:coin,idx,mode:"place",startPos:sp.clone(),targetPos:sp.clone(),t:0,dur:1.2,done:false});
        } else {
            const ang=Math.random()*Math.PI*2, spd=(0.5+Math.random()*1.2)*MODEL_SCALE;
            coinAnims.push({mesh:coin,mode:"fountain",startPos:sp.clone(),
                vx:Math.cos(ang)*spd,vz:Math.sin(ang)*spd,vy:(2.0+Math.random()*1.5)*MODEL_SCALE,t:0,dur:2.0});
        }
    });
}

/* =====================================================
SPHERE CLICK
===================================================== */
function checkComplete(){
    return ARTIFACTS.every((_,i)=>(clickCounts[i]||0)>0);
}

function onSphereClick(sphere){
    if(gamePhase!=="playing") return;
    const idx=sphere.userData.artifactIndex;
    const cnt=clickCounts[idx]||0, first=cnt===0;
    clickCounts[idx]=cnt+1;
    gameScore+=first?5:1; updateHUD();
    sphere.material.color.set(first?0xff4444:0xffffff);
    setTimeout(()=>sphere.material.color.set(0xffdd33),160);
    sfxClick(); vibrate(80,0.9);
    spawnCoin(idx,first);

    if(first && checkComplete()){
        gameScore+=50; updateHUD();
        vibrate(500,1.0);
        showOverlay("🎊 COMPLETE!","+50pt ボーナス！");
        setTimeout(hideOverlay,2500);
    }
}

/* =====================================================
MOTION
===================================================== */
let prevTime=performance.now(), keyUp=false, keyDown=false;
const pos=new THREE.Vector3(), tan=new THREE.Vector3(), lkAt=new THREE.Vector3();
let prevPos=new THREE.Vector3(), realSpeed=0;
let lastSpeedUI=0, lastSound=0;
const raycaster=new THREE.Raycaster(), tmpMtx=new THREE.Matrix4();

window.addEventListener("keydown",e=>{
    if(e.code==="ArrowUp")   keyUp=true;
    if(e.code==="ArrowDown") keyDown=true;
    if(e.code==="KeyS"&&gamePhase==="idle"){
        if(CONFIG.gameMode==="learning") startLearningMode();
        else startCountdown();
    }
    if(e.code==="KeyE"){
        if(CONFIG.gameMode==="learning") doLearnForceEnd();
        else doForceEnd();
    }
    if(e.code==="KeyG"&&CONFIG.gameMode==="learning") onLearnGoPressed();
});
window.addEventListener("keyup",e=>{
    if(e.code==="ArrowUp")   keyUp=false;
    if(e.code==="ArrowDown") keyDown=false;
});

function getStickY(){
    const s=renderer.xr.getSession(); if(!s) return 0;
    for(const src of s.inputSources){
        if(src.handedness==="right"&&src.gamepad&&src.gamepad.axes.length>3){
            const y=src.gamepad.axes[3]; if(Math.abs(y)>0.15) return y;
        }
    }
    return 0;
}
function getRightGP(){
    const s=renderer.xr.getSession(); if(!s) return null;
    for(const src of s.inputSources){ if(src.handedness==="right"&&src.gamepad) return src.gamepad; }
    return null;
}

let prevA=false,prevB=false,prevTrig0=false,prevTrig1=false;

/* =====================================================
ANIMATION LOOP
===================================================== */
renderer.setAnimationLoop(()=>{
    const now=performance.now(), dt=now-prevTime;

    const isVR = renderer.xr.isPresenting;
    const isTour = CONFIG.gameMode === "tour";
    const isLearning = CONFIG.gameMode === "learning";

    // Progress update: stop during excavation
    const learnStop = isLearning && (learningSubState==="excavating" || gamePhase==="result");
    if(isTour || (gamePhase==="playing" && !learnStop)) progress=(progress+velocity)%1;

    pos.copy(curve.getPointAt(progress)); pos.y+=0.2;
    const moving = isTour || (gamePhase==="playing" && !learnStop);
    realSpeed = moving ? pos.distanceTo(prevPos)/(dt/1000)*3.6 : 0;
    if(now-lastSpeedUI>100){ if(realSpeedUI) realSpeedUI.textContent=realSpeed.toFixed(0)+" km/h"; lastSpeedUI=now; }
    prevPos.copy(pos);
    train.position.copy(pos);
    if(now-lastMeter>100){ drawMeter(realSpeed); lastMeter=now; }
    tan.copy(curve.getTangentAt(progress));

    const ACCEL=0.0000001,DECEL=ACCEL*0.5;
    accelState=0;
    if(isTour || (gamePhase==="playing" && !learnStop)){
        if(!isTour && keyUp)  {velocity+=ACCEL*dt;accelState=1;}
        if(!isTour && keyDown){velocity-=DECEL*dt;accelState=-1;}
        const sy=getStickY();
        if(sy<-0.2){velocity+=ACCEL*dt*(-sy);accelState=1;}
        if(sy>0.2){velocity-=DECEL*dt*sy;accelState=-1;}
        const tg=accelState?1:0; glowStr+=(tg-glowStr)*0.15;
        velocity-=tan.y*1e-7*dt*SPEED;
        const TV=0.00012*SPEED;
        if(velocity>TV){const d=velocity-TV;velocity-=(d*d*0.0001+d*0.001)*dt;}
        velocity=Math.max(0.00005*SPEED,Math.min(0.0003*SPEED,velocity));
    }
    train.lookAt(lkAt.copy(pos).sub(tan));
    if(orbitControls) orbitControls.update();

    rotatingObjects.forEach(o=>{ if(o.visible) o.rotation.y+=0.005; });
    auras.forEach((a,i)=>{
        a.rotation.y+=0.002;
        a.position.y=ARTIFACT_HEIGHT+(-0.6+Math.sin(now*0.001+i)*0.04)*MODEL_SCALE;
        const s=(0.2+Math.sin(now*0.002+i)*0.005)*MODEL_SCALE; a.scale.set(s,s,s);
    });
    anchors.forEach((a,i)=>{const s=(1+Math.sin(now*0.002+i)*0.05)*MODEL_SCALE;a.scale.set(s,s,s);});
    scenelines.forEach((l,i)=>{const k=0.5+Math.sin(now*0.003+i)*0.5;l.material.color.setRGB(0.5*k,0.8*k,k);});

    if(isLearning){
        clickSpheres.forEach((s,i)=>updateLearnSphereVisual(i,now));
        tickLearnExcavation(dt/1000);
        updateLearnHUD(); // ⑥ 毎フレーム更新
        // rotate hand models
        learnHandModels.forEach(h=>{ h.mesh.rotation.y+=0.012; });
    } else {
        clickSpheres.forEach((s,i)=>{const p=0.9+Math.sin(now*0.003+i*0.8)*0.1;s.scale.setScalar(p);});
    }

    const showHUD = isVR && !isTour && !isLearning;
    HUD.mesh.visible = showHUD;
    SB.mesh.visible  = showHUD;
    const showLearnHUD = isVR && isLearning;
    LHUD.mesh.visible = showLearnHUD;
    LSB.mesh.visible  = showLearnHUD;

    const dtSec=dt/1000;
    for(let i=coinAnims.length-1;i>=0;i--){
        const c=coinAnims[i]; c.t+=dtSec; const tr=Math.min(c.t/c.dur,1);
        if(c.mode==="place"){
            const arc=Math.sin(tr*Math.PI)*2*MODEL_SCALE;
            c.mesh.position.lerpVectors(c.startPos,c.targetPos,tr); c.mesh.position.y+=arc;
            c.mesh.rotation.y+=0.15; c.mesh.rotation.z+=0.05;
            if(tr>=1&&!c.done){
                c.done=true;
                if(c.idx!==undefined&&permanentModels[c.idx]) permanentModels[c.idx].visible=true;
                scene.remove(c.mesh); coinAnims.splice(i,1);
            }
        } else if(c.mode==="fountain"){
            const g=9.8*MODEL_SCALE,e=c.t;
            c.mesh.position.set(c.startPos.x+c.vx*e,c.startPos.y+c.vy*e-0.5*g*e*e,c.startPos.z+c.vz*e);
            c.mesh.rotation.y+=0.2; c.mesh.rotation.x+=0.1;
            const peak=c.vy/g;
            if(e>peak){
                const fr=Math.max(0,1-(e-peak)/(c.dur-peak));
                c.mesh.traverse(ch=>{if(ch.isMesh&&ch.material){ch.material.transparent=true;ch.material.opacity=fr;}});
            }
            if(tr>=1){scene.remove(c.mesh);coinAnims.splice(i,1);}
        }
    }

    function updateLaser(ctrl, laserObj) {
        tmpMtx.identity().extractRotation(ctrl.matrixWorld);
        raycaster.ray.origin.setFromMatrixPosition(ctrl.matrixWorld);
        raycaster.ray.direction.set(0,0,-1).applyMatrix4(tmpMtx);
        // Learning mode: exclude done spheres (already hidden), plus check Go button
        let targets = [...clickSpheres.filter(s=>s.visible)];
        if(isLearning && learnGoReady && GOBT.mesh.visible){
            targets.push(GOBT.mesh);
        }
        const hits = raycaster.intersectObjects(targets, false);
        const hitDist = hits.length > 0 ? hits[0].distance : LASER_MAX_DIST;
        laserObj.line.geometry.setFromPoints([new THREE.Vector3(0,0,0), new THREE.Vector3(0,0,-hitDist)]);
        laserObj.mat.color.set(hits.length > 0 ? 0x00ff88 : 0xff3333);
        laserObj.dot.position.set(0, 0, -hitDist);
        laserObj.dot.visible = hits.length > 0;
        return hits;
    }

    let bA=false, bB=false, trigRight=false, trigLeft=false;
    let hitsRight=[], hitsLeft=[];
    laserRight.line.visible = false;
    laserLeft.line.visible  = false;

    if(!isTour && isVR){
        if(rightController){
            laserRight.line.visible = true;
            hitsRight = updateLaser(rightController, laserRight);
        }
        if(leftController){
            laserLeft.line.visible = true;
            hitsLeft  = updateLaser(leftController,  laserLeft);
        }
    }

    const xrSess = renderer.xr.getSession();
    if(xrSess){
        for(const src of xrSess.inputSources){
            if(!src.gamepad) continue;
            if(src.handedness==="right"){
                trigRight = src.gamepad.buttons[0]?.pressed ?? false;
                bA        = src.gamepad.buttons[4]?.pressed ?? false;
                bB        = src.gamepad.buttons[5]?.pressed ?? false;
            } else if(src.handedness==="left"){
                trigLeft  = src.gamepad.buttons[0]?.pressed ?? false;
            }
        }
    }

    if(!isTour){
        if(isLearning){
            if(bA&&!prevA&&gamePhase==="idle") startLearningMode();
            // ⑦ Bボタン強制終了（学びモード、いつでも有効）
            if(bB&&!prevB&&(gamePhase==="playing"||gamePhase==="countdown")) doLearnForceEnd();
            // Trigger: click sphere or Go button
            const allHits = [...hitsRight,...hitsLeft];
            const trigPressed = (trigRight&&!prevTrig0)||(trigLeft&&!prevTrig1);
            if(trigPressed && gamePhase==="playing"){
                // Check if Go button hit
                if(learnGoReady && allHits.some(h=>h.object===GOBT.mesh)){
                    onLearnGoPressed();
                } else {
                    // Click a sphere
                    const sphereHit = allHits.find(h=>h.object!==GOBT.mesh);
                    if(sphereHit) onLearnSphereClick(sphereHit.object);
                }
            }
        } else {
            if(bA&&!prevA&&gamePhase==="idle") startCountdown();
            if(bB&&!prevB&&(gamePhase==="playing"||gamePhase==="countdown")) doForceEnd();
            if(trigRight&&!prevTrig0&&gamePhase==="playing"&&hitsRight.length>0) onSphereClick(hitsRight[0].object);
            if(trigLeft &&!prevTrig1&&gamePhase==="playing"&&hitsLeft.length>0)  onSphereClick(hitsLeft[0].object);
        }
    }
    prevA=bA; prevB=bB; prevTrig0=trigRight; prevTrig1=trigLeft;

    renderer.render(scene,camera);
    prevTime=now;

    if(isTour && isVR && railSound.paused) {
        railSound.play().catch(()=>{});
    }
    if(!railSound.paused && now-lastSound>500){
        lastSound=now;
        const sr=velocity*1000*MODEL_SCALE;
        railSound.volume=CONFIG.curve==="trolley"?0.6:Math.min(1,sr);
        railSound.playbackRate=Math.max(0.5,1+sr*0.5);
    }
});

/* =====================================================
RESIZE
===================================================== */
window.addEventListener("resize",()=>{
    camera.aspect=window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth,window.innerHeight);
});
