<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width">
<title>Echizen Ruins VR Coaster</title>

<style>
    body{
        margin:0;
        overflow:hidden;
    }
    #ui{
        position:absolute;
        top:20px;
        left:20px;
        z-index:10;
        display:flex;
        flex-direction:column;
        gap:20px;
        background:rgba(0,0,0,0.6);
        padding:20px;
        border-radius:12px;
        color:white;
    }

    .control{
        display:flex;
        flex-direction:column;
    }

    button{
        padding:16px 20px;
        min-width:220px;
    }

    input[type=range]{
        width:360px;
        height:30px;
    }
</style>
</head>

<body>

<audio id="railSound" src="trolley_clatter.mp3" loop></audio>

<div id="ui">
    <div class="control">
        速度
        <input type="range" id="speedSlider" min="0" max="2" step="0.1">
        <span id="speedValue"></span>
    </div>
    <button id="cameraBtn"></button>
    <button id="curveBtn"></button>
    <button id="soundBtn">Sound:OFF</button>
</div>

<script type="importmap">
    {
        "imports":{
            "three":"https://code4fukui.github.io/three.js/build/three.module.js",
            "three/addons/":"https://code4fukui.github.io/three.js/examples/jsm/"
        }
    }
</script>

<script type="module">

import * as THREE from "three";
import {Curve,addCoaster} from "https://code4fukui.github.io/vr-tojinbo/TojinboCoaster.js";
import {OrbitControls} from "three/addons/controls/OrbitControls.js";
import {VRButton} from "three/addons/webxr/VRButton.js";
import {GLTFLoader} from "three/addons/loaders/GLTFLoader.js";

////////////////////////////////////////////////////////
//// localStorage読み込み
////////////////////////////////////////////////////////

let SPEED = Number(localStorage.getItem("speed") ?? 0.5);
let CAMERA_POSITION = Number(localStorage.getItem("camera") ?? 0);
let CURVE_MODE = Number(localStorage.getItem("curve") ?? 1);

////////////////////////////////////////////////////////
//// 設定
////////////////////////////////////////////////////////

const MODEL_SCALE = 5;         // 遺跡サイズ
const ARTIFACT_SCALE = 5;      // 出土品サイズ
const ARTIFACT_HEIGHT = 5;     // 出土品高さ

const RAIL_RADIUS = 40;        // レール半径
const RAIL_HEIGHT = 10;        // コース高さ
const RAIL_OVAL = 0.3;         // 楕円率

////////////////////////////////////////////////////////
//// UI
////////////////////////////////////////////////////////

const slider = document.getElementById("speedSlider");
const speedValue = document.getElementById("speedValue");
const cameraBtn = document.getElementById("cameraBtn");
const curveBtn = document.getElementById("curveBtn");
const soundBtn = document.getElementById("soundBtn");
const sound = document.getElementById("railSound");

slider.value = SPEED;
speedValue.textContent = SPEED.toFixed(1);

slider.oninput = () => {
    SPEED = Number(slider.value);
    speedValue.textContent = SPEED.toFixed(1);
    localStorage.setItem("speed",SPEED);
};

function updateButtons(){
    cameraBtn.textContent = CAMERA_POSITION == 0 ? "Camera:外部":"Camera:レール";
    curveBtn.textContent = CURVE_MODE == 0 ? "Curve:トロッコ":"Curve:コースター";
}

updateButtons();

cameraBtn.onclick = () => {
    CAMERA_POSITION = CAMERA_POSITION ? 0 : 1;
    localStorage.setItem("camera", CAMERA_POSITION);
    location.reload();
};

curveBtn.onclick = () => {
    CURVE_MODE = CURVE_MODE ? 0 : 1;
    localStorage.setItem("curve", CURVE_MODE);
    location.reload();
};

let SOUND_ON;

function updateSound(){
    soundBtn.textContent = SOUND_ON ? "Sound:ON" : "Sound:OFF";
    if(SOUND_ON){
        railSound.play();
    }else{
        railSound.pause();
    }
}

updateSound();

soundBtn.onclick = () => {
    SOUND_ON =! SOUND_ON;
    updateSound();
};

////////////////////////////////////////////////////////
//// renderer
////////////////////////////////////////////////////////

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(window.innerWidth,window.innerHeight);
renderer.xr.enabled = true;

document.body.appendChild(renderer.domElement);
document.body.appendChild(VRButton.createButton(renderer));

////////////////////////////////////////////////////////
//// scene
////////////////////////////////////////////////////////

const scene = new THREE.Scene();

////////////////////////////////////////////////////////
//// camera
////////////////////////////////////////////////////////

const camera = new THREE.PerspectiveCamera(50, window.innerWidth/window.innerHeight, 0.1, 1000);
let controls;

////////////////////////////////////////////////////////
//// curve
////////////////////////////////////////////////////////

class MyCurve extends Curve {

    getPointAt(t) {
        t *= Math.PI * 2;
        if (CURVE_MODE == 0) {
            const x = Math.sin(t * 3) * RAIL_RADIUS;
            const y = RAIL_HEIGHT;
            const z = Math.sin(t * 2) * RAIL_RADIUS * RAIL_OVAL;
            return this.vector.set(x, y, z);
        } else {
            const x = Math.sin(t * 3) * Math.cos(t * 4) * RAIL_RADIUS;
            const y = Math.sin(t * 10) * 2 + Math.cos(t * 17) * 2 + RAIL_HEIGHT;
            const z = Math.sin(t) * Math.sin(t * 4) * RAIL_RADIUS * RAIL_OVAL;
            return this.vector.set(x, y, z);
        }
    }
}

const curve = new MyCurve();

////////////////////////////////////////////////////////
//// coaster
////////////////////////////////////////////////////////

await addCoaster(scene, curve, null,
"https://www.city.echizen.lg.jp/office/030/021/open-data-echizen_d/fil/00101_kokufuhakkutsu.glb"
);

////////////////////////////////////////////////////////
//// 遺跡スケール変更
////////////////////////////////////////////////////////

let scaled = false;

scene.traverse((obj) => {
    if(obj.isMesh && !scaled){
        let root = obj;
        while(root.parent && root.parent.type !== "Scene"){
            root = root.parent;
        }
        root.scale.set(MODEL_SCALE,MODEL_SCALE,MODEL_SCALE);
        root.rotation.y = THREE.MathUtils.degToRad(20);
        scaled = true;
    }
});

////////////////////////////////////////////////////////
//// 出土品
////////////////////////////////////////////////////////

const loader = new GLTFLoader();

loader.load(
    "https://raw.githubusercontent.com/echizencity/opendata/main/kokufuhakkutsu2/model02_small.glb",
    (gltf)=>{
        const artifact=gltf.scene;
        artifact.scale.set(ARTIFACT_SCALE,ARTIFACT_SCALE,ARTIFACT_SCALE);
        artifact.position.set(0,ARTIFACT_HEIGHT,0);
        scene.add(artifact);
    }
);

////////////////////////////////////////////////////////
//// 説明書
////////////////////////////////////////////////////////
const textureLoader = new THREE.TextureLoader();

textureLoader.load(
    "https://raw.githubusercontent.com/echizencity/opendata/main/kokufuhakkutsu/20400_kokufuhakkutsu.png",
    function(texture) {
        texture.colorSpace = THREE.SRGBColorSpace;
        const geometry = new THREE.PlaneGeometry(12, 12);
        const material = new THREE.MeshBasicMaterial({
            map: texture,
            transparent: true,
            toneMapped:false
        });
        const imagePlane = new THREE.Mesh(geometry, material);
        imagePlane.position.set(40, 15, 0);
        imagePlane.rotation.y = Math.PI * -0.5;
        scene.add(imagePlane);
    }
);

////////////////////////////////////////////////////////
//// train
////////////////////////////////////////////////////////

const geometry = new THREE.BoxGeometry(0.5,0.5,1);
const material = new THREE.MeshBasicMaterial({color:15628151});

const train = new THREE.Mesh(geometry,material);
scene.add(train);

////////////////////////////////////////////////////////
//// camera
////////////////////////////////////////////////////////

if(CAMERA_POSITION == 0){
    const controls = new OrbitControls(camera,renderer.domElement);
    controls.listenToKeyEvents(window);
    camera.position.set(0,20,100);
} else {
    train.add(camera);
    camera.position.set(0,1.2,0);
};
////////////////////////////////////////////////////////
//// motion variables
////////////////////////////////////////////////////////

const position = new THREE.Vector3();
const tangent = new THREE.Vector3();
const lookAt = new THREE.Vector3();

let velocity = 0.0001;
let progress = 0;
let prevTime = performance.now();

////////////////////////////////////////////////////////
//// animation
////////////////////////////////////////////////////////

renderer.setAnimationLoop( () => {

    const time = performance.now();
    const delta = time - prevTime;

    progress += velocity;
    progress %= 1;

    position.copy(curve.getPointAt(progress));
    position.y += 0.2;

    train.position.copy(position);

    tangent.copy(curve.getTangentAt(progress));

    const vc = SPEED;

    velocity -= tangent.y * 1e-7 * delta * vc;

    const MIN_SPEED = 0.00004 * vc;
    const MAX_SPEED = 0.0002  * vc;

    velocity = Math.max(MIN_SPEED, Math.min(MAX_SPEED, velocity));

    train.lookAt(
        lookAt.copy(position).sub(tangent)
    );

    if(controls) controls.update();

    renderer.render(scene,camera);

    prevTime = time;

    if(!railSound.paused){
        const speedRatio = velocity * 1000;
        railSound.volume = Math.min(1, speedRatio);
        const targetRate = 1 + speedRatio * 2;
        railSound.playbackRate += (targetRate - railSound.playbackRate) * 0.05;

    }

});

////////////////////////////////////////////////////////
//// resize
////////////////////////////////////////////////////////

window.addEventListener("resize",()=>{
    camera.aspect = window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

</script>
</body>
</html>
