<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width">
<title>越前国府VRコースター</title>
<style>
    *, *::before, *::after { box-sizing:border-box; }
    body { margin:0; overflow:hidden; font-family:'Helvetica Neue',Arial,sans-serif; background:#000; }

    /* ═══════════════════════════════════════════════
       フルスクリーン タイトルパネル（ride モード）
    ═══════════════════════════════════════════════ */
    #uiPanel {
        position:absolute; inset:0;
        display:flex; flex-direction:column; align-items:center; justify-content:center;
        background:
            radial-gradient(ellipse at 30% 20%, rgba(120,60,240,0.55) 0%, transparent 60%),
            radial-gradient(ellipse at 70% 80%, rgba(30,80,220,0.50) 0%, transparent 60%),
            linear-gradient(160deg, #04040f 0%, #0a0620 50%, #060818 100%);
        color:#fff; z-index:10;
        overflow-y:auto;
    }
    /* 背景粒子風装飾 */
    #uiPanel::before {
        content:''; position:absolute; inset:0; pointer-events:none;
        background:
            radial-gradient(circle 1px at 15% 25%, rgba(200,160,255,0.5) 0%, transparent 100%),
            radial-gradient(circle 1px at 80% 15%, rgba(160,200,255,0.4) 0%, transparent 100%),
            radial-gradient(circle 1px at 60% 70%, rgba(200,160,255,0.3) 0%, transparent 100%),
            radial-gradient(circle 2px at 40% 55%, rgba(100,180,255,0.3) 0%, transparent 100%);
    }

    .panel-inner {
        position:relative; z-index:1;
        width:min(680px,92vw);
        display:flex; flex-direction:column; align-items:center; gap:0;
    }

    /* タイトル */
    .main-title {
        font-size:clamp(28px,5vw,52px); font-weight:900; letter-spacing:3px;
        text-align:center; margin:0 0 8px;
        background:linear-gradient(90deg,#e0b0ff 0%,#90d0ff 45%,#e0b0ff 100%);
        -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
        filter:drop-shadow(0 0 18px rgba(180,120,255,0.7));
        animation:titleGlow 3s ease-in-out infinite alternate;
    }
    @keyframes titleGlow {
        from { filter:drop-shadow(0 0 14px rgba(180,120,255,0.5)); }
        to   { filter:drop-shadow(0 0 28px rgba(140,200,255,0.9)); }
    }
    .sub-title {
        font-size:clamp(14px,2.2vw,20px); color:rgba(200,185,255,0.80);
        letter-spacing:2px; margin:0 0 28px; text-align:center;
    }

    /* VR ボタンラッパー */
    #vrButtonWrap {
        width:100%; margin-bottom:22px;
    }
    #vrButtonWrap button, #vrButtonWrap a {
        display:block !important;
        position: static !important;
        width:100% !important;
        padding:18px 0 !important;
        font-size:clamp(16px,2.5vw,22px) !important;
        font-weight:800 !important;
        letter-spacing:1px !important;
        background:linear-gradient(135deg,#7c3aed,#1d4ed8) !important;
        color:#fff !important;
        border:none !important;
        border-radius:12px !important;
        cursor:pointer !important;
        text-decoration:none !important;
        box-shadow:0 0 32px rgba(120,80,255,0.7), inset 0 1px 0 rgba(255,255,255,0.15) !important;
        transition:box-shadow .2s, transform .1s !important;
    }
    #vrButtonWrap button:hover, #vrButtonWrap a:hover {
        box-shadow:0 0 48px rgba(120,80,255,0.95) !important; transform:translateY(-1px) !important;
    }

    /* 区切り線 */
    .divider {
        width:100%; height:1px;
        background:linear-gradient(90deg,transparent,rgba(180,140,255,0.4),transparent);
        margin:4px 0 18px;
    }

    /* 設定グリッド */
    .settings-grid {
        width:100%; display:grid;
        grid-template-columns:1fr 1fr;
        gap:12px; margin-bottom:16px;
    }
    .setting-card {
        background:rgba(255,255,255,0.05);
        border:1px solid rgba(180,140,255,0.2);
        border-radius:10px; padding:12px 14px;
    }
    .setting-label {
        font-size:11px; font-weight:700; letter-spacing:2px;
        color:rgba(180,160,255,0.65); text-transform:uppercase; margin-bottom:8px;
    }
    .toggle { display:flex; width:100%; }
    .toggle button {
        flex:1; border:none; padding:10px 6px;
        background:rgba(80,70,130,0.7); color:rgba(255,255,255,0.65);
        cursor:pointer; font-size:13px; font-weight:600;
        transition:background .15s, color .15s;
    }
    .toggle button:first-child { border-radius:7px 0 0 7px; }
    .toggle button:last-child  { border-radius:0 7px 7px 0; }
    .toggle button.active {
        background:linear-gradient(135deg,#7c3aed,#1d4ed8); color:#fff;
    }

    /* スピードカード（幅フル） */
    .setting-card.full { grid-column:1/-1; }
    .speed-row { display:flex; align-items:center; gap:10px; }
    input[type=range] { flex:1; accent-color:#a78bfa; height:4px; }
    #speedValue { font-size:15px; font-weight:700; color:#a78bfa; min-width:32px; text-align:right; }

    /* ボタン行 */
    .btn-row {
        width:100%; display:flex; gap:10px; margin-bottom:4px;
    }
    .action-btn {
        flex:1; padding:13px 0; font-size:clamp(13px,1.8vw,16px); font-weight:700;
        border:none; border-radius:9px; cursor:pointer; transition:opacity .15s, transform .1s;
    }
    .action-btn:hover { opacity:.85; transform:translateY(-1px); }
    .btn-help   { background:linear-gradient(135deg,#0f766e,#0891b2); color:#fff; }
    .btn-reset  { background:linear-gradient(135deg,#991b1b,#b45309); color:#fff; }

    /* ═══════════════════════════════════════════════
       モーダル（操作説明）
    ═══════════════════════════════════════════════ */
    #modal {
        display:none; position:fixed; inset:0; z-index:100;
        background:rgba(0,0,5,0.88);
        align-items:center; justify-content:center;
    }
    #modal.open { display:flex; }
    .modal-box {
        width:min(640px,90vw); max-height:80vh; overflow-y:auto;
        background:linear-gradient(150deg,#0d0820,#080d25);
        border:1px solid rgba(180,140,255,0.35);
        border-radius:16px; padding:28px 30px 24px;
        position:relative; color:#e8e0ff;
    }
    .modal-close {
        position:absolute; top:14px; right:18px;
        background:none; border:none; color:rgba(200,180,255,0.6);
        font-size:26px; cursor:pointer; line-height:1;
    }
    .modal-close:hover { color:#fff; }
    .modal-tabs {
        display:flex; gap:8px; margin-bottom:22px;
    }
    .modal-tab {
        flex:1; padding:11px 0; font-size:15px; font-weight:700;
        border:1px solid rgba(180,140,255,0.3); border-radius:8px;
        background:rgba(80,70,130,0.4); color:rgba(200,185,255,0.6);
        cursor:pointer; transition:all .15s;
    }
    .modal-tab.active {
        background:linear-gradient(135deg,#7c3aed,#1d4ed8);
        color:#fff; border-color:transparent;
    }
    .modal-content { font-size:15px; line-height:1.85; }
    .modal-content h3 {
        font-size:17px; color:#c4b5fd; margin:0 0 10px; font-weight:800;
    }
    .modal-content .tag {
        display:inline-block; background:rgba(120,80,255,0.3);
        border:1px solid rgba(180,140,255,0.4);
        border-radius:5px; padding:1px 8px; font-size:13px;
        margin:0 2px; color:#c4b5fd; font-weight:700;
    }
    .modal-content ul { margin:6px 0 14px; padding-left:20px; }
    .modal-content li { margin:4px 0; }
    .modal-nav {
        display:flex; align-items:center; justify-content:center;
        gap:16px; margin-top:20px;
    }
    .modal-nav button {
        background:rgba(100,80,180,0.5); border:1px solid rgba(180,140,255,0.3);
        color:#c4b5fd; border-radius:8px; padding:9px 18px;
        font-size:22px; cursor:pointer; transition:background .15s;
    }
    .modal-nav button:hover { background:rgba(120,90,200,0.7); }
    .modal-nav .mode-label {
        font-size:15px; font-weight:700; color:#a78bfa; min-width:120px; text-align:center;
    }

    /* ═══════════════════════════════════════════════
       outsideモード: ミニUI（左上 10%×10%領域）
    ═══════════════════════════════════════════════ */
    #miniUI {
        display:none;
        position:absolute; top:1vh; left:1vw;
        width:clamp(160px,18vw,220px);
        background:rgba(5,5,20,0.82);
        border:1px solid rgba(180,140,255,0.25);
        border-radius:8px; padding:8px 10px;
        z-index:10; color:#fff;
    }
    body.outside-mode #uiPanel { display:none; }
    body.outside-mode #miniUI  { display:block; }
    .mini-label { font-size:10px; color:rgba(180,160,255,0.6); letter-spacing:1px; margin-bottom:6px; }
    .mini-toggle { display:flex; width:100%; }
    .mini-toggle button {
        flex:1; border:none; padding:8px 4px;
        background:rgba(80,70,130,0.7); color:rgba(255,255,255,0.65);
        cursor:pointer; font-size:12px; font-weight:600;
    }
    .mini-toggle button:first-child { border-radius:5px 0 0 5px; }
    .mini-toggle button:last-child  { border-radius:0 5px 5px 0; }
    .mini-toggle button.active { background:linear-gradient(135deg,#7c3aed,#1d4ed8); color:#fff; }
</style>
</head>
<body>
<audio id="railSound" src="trolley_clatter.mp3" loop preload="auto"></audio>

<!-- ═══ フルスクリーン タイトルパネル（ride モード） ═══ -->
<div id="uiPanel">
  <div class="panel-inner">
    <p class="main-title">越前国府VRコースター</p>
    <p class="sub-title">〜体験と挑戦、ふたつの旅〜</p>

    <div id="vrButtonWrap"></div>

    <div class="divider"></div>

    <div class="settings-grid">
      <div class="setting-card">
        <div class="setting-label">カーブ</div>
        <div class="toggle" id="curveToggle">
          <button data-value="trolley">TROLLEY</button>
          <button data-value="coaster">COASTER</button>
        </div>
      </div>
      <div class="setting-card">
        <div class="setting-label">カメラ</div>
        <div class="toggle" id="cameraToggle">
          <button data-value="ride">RIDE</button>
          <button data-value="outside">OUTSIDE</button>
        </div>
      </div>
      <div class="setting-card">
        <div class="setting-label">モード</div>
        <div class="toggle" id="gameModeToggle">
          <button data-value="game">🎮 ゲーム</button>
          <button data-value="tour">🚃 ツアー</button>
        </div>
      </div>
      <div class="setting-card full">
        <div class="setting-label">スピード</div>
        <div class="speed-row">
          <input id="speedSlider" type="range" min="0.1" max="2" step="0.1" value="1">
          <span id="speedValue"></span>
        </div>
      </div>
    </div>

    <!-- ボタン行 -->
    <div class="btn-row">
      <button class="action-btn btn-help" id="helpBtn">📖 操作方法</button>
      <button class="action-btn btn-reset" id="resetBtn">🗑 記録リセット</button>
    </div>
  </div>
</div>

<!-- ═══ outside モード用ミニUI ═══ -->
<div id="miniUI">
  <div class="mini-label">CAMERA</div>
  <div class="mini-toggle" id="miniCameraToggle">
    <button data-value="ride">RIDE</button>
    <button data-value="outside">OUTSIDE</button>
  </div>
</div>

<!-- ═══ 操作説明モーダル ═══ -->
<div id="modal">
  <div class="modal-box">
    <button class="modal-close" id="modalClose">×</button>
    <div class="modal-tabs">
      <button class="modal-tab active" data-mode="game">🎮 ゲームモード</button>
      <button class="modal-tab" data-mode="tour">🚃 ツアーモード</button>
    </div>
    <div class="modal-content" id="modalContent"></div>
    <div class="modal-nav">
      <button id="modalPrev">◀</button>
      <span class="mode-label" id="modalModeLabel">ゲームモード</span>
      <button id="modalNext">▶</button>
    </div>
  </div>
</div>

<script type="importmap">
{
    "imports":{
        "three":"https://code4fukui.github.io/three.js/build/three.module.js",
        "three/addons/":"https://code4fukui.github.io/three.js/examples/jsm/"
    }
}
</script>
<script type="module">
import * as THREE from "three";
import {Curve, addCoaster} from "https://code4fukui.github.io/vr-tojinbo/TojinboCoaster.js";
import {OrbitControls} from "three/addons/controls/OrbitControls.js";
import {VRButton} from "three/addons/webxr/VRButton.js";
import {GLTFLoader} from "three/addons/loaders/GLTFLoader.js";
import {XRControllerModelFactory} from "three/addons/webxr/XRControllerModelFactory.js";

/* =====================================================
CONSTANTS
===================================================== */
const MODEL_SCALE    = 5;
const ARTIFACT_SCALE = MODEL_SCALE;
const ARTIFACT_HEIGHT= 1.5 * MODEL_SCALE;
const RAIL_RADIUS    = 3.6 * MODEL_SCALE;
const RAIL_HEIGHT    = 1.7 * MODEL_SCALE;
const RAIL_OVAL      = 0.4;
const GAME_DURATION  = 60;
const LASER_MAX_DIST = 25;

/* =====================================================
CONFIG
===================================================== */
const CONFIG = {
    curve    : localStorage.getItem("curve")    || "trolley",
    camera   : "ride",
    speed    : parseFloat(localStorage.getItem("speed") || 0.5),
    gameMode : localStorage.getItem("gameMode") || "game"
};
let SPEED = CONFIG.speed;

/* =====================================================
SCORES
===================================================== */
const LS_KEY = "vr_coaster_scores_v2";
function loadScores() {
    try { return JSON.parse(localStorage.getItem(LS_KEY) || "[]"); } catch(e) { return []; }
}
function saveScore(score) {
    const arr = loadScores();
    arr.push({ score, date: new Date().toLocaleDateString("ja-JP") });
    arr.sort((a,b)=>b.score-a.score); arr.splice(5);
    localStorage.setItem(LS_KEY, JSON.stringify(arr));
}
document.getElementById("resetBtn").addEventListener("click", () => {
    if (confirm("記録をリセットしますか？")) { localStorage.removeItem(LS_KEY); updateScoreBoard(); }
});

/* =====================================================
UI SETUP
===================================================== */
const railSound = document.getElementById("railSound");
railSound.pause();
railSound.volume = 0.6;

function setupToggle(id, key) {
    const btns = document.querySelectorAll(`#${id} button`);
    btns.forEach(btn => {
        if (btn.dataset.value === CONFIG[key]) btn.classList.add("active");
        btn.onclick = () => {
            btns.forEach(b=>b.classList.remove("active")); btn.classList.add("active");
            localStorage.setItem(key, btn.dataset.value); location.reload();
        };
    });
}

function setupCameraToggle(id) {
    const btns = document.querySelectorAll(`#${id} button`);
    btns.forEach(btn => {
        if (btn.dataset.value === CONFIG.camera) btn.classList.add("active");
        btn.onclick = () => {
            btns.forEach(b=>b.classList.remove("active")); btn.classList.add("active");
            location.reload();
            sessionStorage.setItem("camera_tmp", btn.dataset.value);
        };
    });
}

{
    const tmp = sessionStorage.getItem("camera_tmp");
    if(tmp){ CONFIG.camera = tmp; sessionStorage.removeItem("camera_tmp");
        if(tmp==="outside") document.body.classList.add("outside-mode");
        else document.body.classList.remove("outside-mode");
    }
}
setupToggle("curveToggle","curve");
setupCameraToggle("cameraToggle");
setupToggle("gameModeToggle","gameMode");

setupCameraToggle("miniCameraToggle");

const speedSlider  = document.getElementById("speedSlider");
const speedValueEl = document.getElementById("speedValue");
const realSpeedUI  = null;
speedSlider.value = SPEED;
speedValueEl.textContent = SPEED.toFixed(1);
speedSlider.oninput = () => {
    SPEED = parseFloat(speedSlider.value);
    speedValueEl.textContent = SPEED.toFixed(1);
    localStorage.setItem("speed", SPEED);
};

const MODAL_MODES = ["game","tour"];
let modalModeIdx = MODAL_MODES.indexOf(CONFIG.gameMode);
if (modalModeIdx < 0) modalModeIdx = 0;

const MODAL_TEXT = {
    game: `
        <h3>🎮 ゲームモード</h3>
        <p>制限時間 <strong>60秒</strong> 以内に、レール沿いに浮かぶ
        <span class="tag">黄色い球</span> をできるだけ多く撃ちましょう！</p>
        <h3 style="margin-top:14px">📊 得点</h3>
        <ul>
          <li>初回クリック：<strong>+5pt</strong></li>
          <li>同じ球を再クリック：<strong>+1pt</strong></li>
          <li>全モデル コンプリート：<strong>+50pt ボーナス🎊</strong></li>
        </ul>
        <h3>🕹 VR コントローラー操作</h3>
        <ul>
          <li>右スティック ↑↓：加速 / 減速</li>
          <li>右トリガー：右レーザーで球を撃つ</li>
          <li>左トリガー：左レーザーで球を撃つ</li>
          <li><span class="tag">A</span> ボタン（右）：ゲームスタート</li>
          <li><span class="tag">B</span> ボタン（右）：強制終了</li>
        </ul>`,
    tour: `
        <h3>🚃 ツアーモード</h3>
        <p>制限時間なし。遺跡の発掘モデルを眺めながら<br>
        レール上をのんびり走り回れます。</p>
        <h3 style="margin-top:14px">🕹 VR コントローラー操作</h3>
        <ul>
          <li>右スティック ↑：加速</li>
          <li>右スティック ↓：減速</li>
        </ul>
        <p style="margin-top:10px;color:rgba(200,185,255,0.7);font-size:13px">
        ※ レーザー・クリック・得点は無効です。<br>
        ※ すべての発掘モデルが最初から表示されます。</p>`
};

function renderModal() {
    const mode = MODAL_MODES[modalModeIdx];
    document.getElementById("modalContent").innerHTML = MODAL_TEXT[mode];
    document.getElementById("modalModeLabel").textContent =
        mode === "game" ? "ゲームモード" : "ツアーモード";
    document.querySelectorAll(".modal-tab").forEach(t => {
        t.classList.toggle("active", t.dataset.mode === mode);
    });
}
renderModal();

document.getElementById("helpBtn").onclick = () => {
    document.getElementById("modal").classList.add("open");
    renderModal();
};
document.getElementById("modalClose").onclick = () =>
    document.getElementById("modal").classList.remove("open");
document.getElementById("modal").addEventListener("click", e => {
    if (e.target === document.getElementById("modal"))
        document.getElementById("modal").classList.remove("open");
});
document.getElementById("modalPrev").onclick = () => {
    modalModeIdx = (modalModeIdx - 1 + MODAL_MODES.length) % MODAL_MODES.length;
    renderModal();
};
document.getElementById("modalNext").onclick = () => {
    modalModeIdx = (modalModeIdx + 1) % MODAL_MODES.length;
    renderModal();
};
document.querySelectorAll(".modal-tab").forEach(tab => {
    tab.onclick = () => {
        modalModeIdx = MODAL_MODES.indexOf(tab.dataset.mode);
        renderModal();
    };
});

/* =====================================================
WEB AUDIO — synthesised SFX
===================================================== */
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function sfxClick() {
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.connect(g); g.connect(audioCtx.destination);
    o.type = "sine"; o.frequency.setValueAtTime(880, audioCtx.currentTime);
    o.frequency.exponentialRampToValueAtTime(1760, audioCtx.currentTime + 0.04);
    g.gain.setValueAtTime(0.6, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.18);
    o.start(); o.stop(audioCtx.currentTime + 0.18);
}

function sfxCountdown(n) {
    // n=1,2,3
    if (n > 0) {
        const o = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        o.connect(g); g.connect(audioCtx.destination);
        o.type = "square";
        const freq = 220 + (4 - n) * 110;
        o.frequency.setValueAtTime(freq, audioCtx.currentTime);
        g.gain.setValueAtTime(0.3, audioCtx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.25);
        o.start(); o.stop(audioCtx.currentTime + 0.25);
    } else {
        // GO!
        [440, 554, 659, 880].forEach((f, i) => {
            const o = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            o.connect(g); g.connect(audioCtx.destination);
            o.type = "triangle"; o.frequency.setValueAtTime(f, audioCtx.currentTime);
            g.gain.setValueAtTime(0, audioCtx.currentTime + i*0.04);
            g.gain.linearRampToValueAtTime(0.25, audioCtx.currentTime + i*0.04 + 0.02);
            g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + i*0.04 + 0.4);
            o.start(audioCtx.currentTime + i*0.04);
            o.stop(audioCtx.currentTime + i*0.04 + 0.4);
        });
    }
}

function sfxTimeUp() {
    [880, 660, 440, 330].forEach((f, i) => {
        const o = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        o.connect(g); g.connect(audioCtx.destination);
        o.type = "sawtooth"; o.frequency.setValueAtTime(f, audioCtx.currentTime + i*0.15);
        g.gain.setValueAtTime(0.35, audioCtx.currentTime + i*0.15);
        g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + i*0.15 + 0.35);
        o.start(audioCtx.currentTime + i*0.15);
        o.stop(audioCtx.currentTime + i*0.15 + 0.4);
    });
}

document.addEventListener("click", ()=>{ if(audioCtx.state==="suspended") audioCtx.resume(); }, {once:true});
document.addEventListener("touchstart", ()=>{ if(audioCtx.state==="suspended") audioCtx.resume(); }, {once:true});

/* =====================================================
SCENE / RENDERER
===================================================== */
const scene    = new THREE.Scene();
const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.xr.enabled = true;
document.body.appendChild(renderer.domElement);
document.getElementById("vrButtonWrap").appendChild(VRButton.createButton(renderer));

/* =====================================================
VR SESSION EVENTS
===================================================== */
renderer.xr.addEventListener("sessionstart", () => {

function makeLaser() {
    const mat = new THREE.LineBasicMaterial({ color:0xff2222, depthTest:false, transparent:true, opacity:0.95 });
    const geo = new THREE.BufferGeometry().setFromPoints([
        new THREE.Vector3(0,0,0), new THREE.Vector3(0,0,-LASER_MAX_DIST)
    ]);
    const line = new THREE.Line(geo, mat);
    line.frustumCulled = false; line.renderOrder = 9999;
    const dot = new THREE.Mesh(
        new THREE.SphereGeometry(0.012, 8, 8),
        new THREE.MeshBasicMaterial({ color:0xffffff, depthTest:false })
    );
    dot.renderOrder = 9999; dot.visible = false;
    line.add(dot);
    return { line, mat, dot };
}

const laserLeft  = makeLaser();

let rightController = null;
let leftController  = null;

function onControllerConnected(event) {
    const ctrl = event.target;
    const hand = event.data.handedness;
    if (hand === "right") {
        rightController = ctrl;
        if (laserRight.line.parent) laserRight.line.parent.remove(laserRight.line);
        ctrl.add(laserRight.line);
    } else if (hand === "left") {
        leftController = ctrl;
        if (laserLeft.line.parent) laserLeft.line.parent.remove(laserLeft.line);
        ctrl.add(laserLeft.line);
    }
}

function onControllerDisconnected(event) {
    const ctrl = event.target;
    if (ctrl === rightController) rightController = null;
    if (ctrl === leftController)  leftController  = null;
}

    getPointAt(t) {

            return this.vector.set(Math.sin(t*3)*RAIL_RADIUS, RAIL_HEIGHT, Math.sin(t*2)*RAIL_RADIUS*RAIL_OVAL);

            Math.sin(t*3)*Math.cos(t*4)*RAIL_RADIUS,
            (Math.sin(t*10)+Math.cos(t*17))*0.4*MODEL_SCALE+RAIL_HEIGHT,
            Math.sin(t)*Math.sin(t*4)*RAIL_RADIUS*RAIL_OVAL

}

function rrect(ctx,x,y,w,h,r){
    ctx.beginPath();
    ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.arcTo(x+w,y,x+w,y+r,r);
    ctx.lineTo(x+w,y+h-r);ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
    ctx.lineTo(x+r,y+h);ctx.arcTo(x,y+h,x,y+h-r,r);
    ctx.lineTo(x,y+r);ctx.arcTo(x,y,x+r,y,r);ctx.closePath();
}

function vibrate(dur,intensity){
    const session=renderer.xr.getSession(); if(!session) return;
    for(const src of session.inputSources){
        if(src.handedness==="right"&&src.gamepad){
            const a=src.gamepad.hapticActuators;
            if(a&&a.length>0) a[0].pulse(intensity,dur);
        }
    }
}

/* =====================================================
GAME LOGIC
===================================================== */
let progress=0, velocity=0.0001;

function teleportToStart(){
    progress=0; velocity=0.0001;
    const p=curve.getPointAt(0).clone(); p.y+=0.2;
    train.position.copy(p);
}

function startCountdown(){
    if(gamePhase!=="idle") return;
    clearTimers();
    vibrate(120,0.5);
    gamePhase="countdown";
    gameScore=0; gameTimeLeft=GAME_DURATION;
    for(const k in clickCounts) delete clickCounts[k];
    teleportToStart(); setDark(0);
    updateHUD();

    let cd=3;
    function tick(){
        if(cd>0){
            sfxCountdown(cd);
            showOverlay(String(cd),"準備！");
            cd--; phaseTimeout=setTimeout(tick,1000);
        } else { hideOverlay(); doStart(); }
    }
    sfxCountdown(cd);
    showOverlay(String(cd),"準備！"); cd=2;
    phaseTimeout=setTimeout(tick,1000);
}

function doStart(){
    gamePhase="playing";
    sfxCountdown(0);
    updateHUD();
    vibrate(300,0.7);
    railSound.play().catch(()=>{});
    mainInterval=setInterval(()=>{
        gameTimeLeft--;
        updateHUD();
        if(gameTimeLeft<=0){ clearInterval(mainInterval); mainInterval=null; doEnd(); }
    },1000);
}

function doEnd(){
    clearTimers();
    gamePhase="result";
    sfxTimeUp();
    vibrate(600,1.0);
    railSound.pause();
    if(gameScore>0) saveScore(gameScore);
    updateScoreBoard(); setDark(0.75);
    showOverlay(`${gameScore}pt`,"🎉 ゲーム終了！");
    cleanCoins();
    phaseTimeout=setTimeout(()=>{
        gamePhase="idle"; gameScore=0; gameTimeLeft=GAME_DURATION;
        setDark(0); hideOverlay(); teleportToStart(); updateHUD();
    },10000);
}

function doForceEnd(){
    if(gamePhase!=="playing"&&gamePhase!=="countdown") return;
    clearTimers();
    vibrate(200,0.8);
    gamePhase="forceend";
    railSound.pause();
    cleanCoins(); setDark(0.75);
    showOverlay("強制終了","スコアは記録されません");
    phaseTimeout=setTimeout(()=>{
        gamePhase="idle"; gameScore=0; gameTimeLeft=GAME_DURATION;
        setDark(0); hideOverlay(); teleportToStart(); updateHUD();
    },3000);
}

    sphere.material.color.set(first?0xff4444:0xffffff);
    setTimeout(()=>sphere.material.color.set(0xffdd33),160);
    sfxClick(); vibrate(80,0.9);
    spawnCoin(idx,first);

    if(first && checkComplete()){
        gameScore+=50; updateHUD();
        vibrate(500,1.0);
        showOverlay("🎊 COMPLETE!","+50pt ボーナス！");
        setTimeout(hideOverlay,2500);
    }
}

/* =====================================================
MOTION
===================================================== */
let prevTime=performance.now(), keyUp=false, keyDown=false;
const pos=new THREE.Vector3(), tan=new THREE.Vector3(), lkAt=new THREE.Vector3();
let prevPos=new THREE.Vector3(), realSpeed=0;
let lastSpeedUI=0, lastSound=0;
const raycaster=new THREE.Raycaster(), tmpMtx=new THREE.Matrix4();

window.addEventListener("keydown",e=>{
    if(e.code==="ArrowUp")   keyUp=true;
    if(e.code==="ArrowDown") keyDown=true;
    if(e.code==="KeyS"&&gamePhase==="idle") startCountdown();
    if(e.code==="KeyE") doForceEnd();
});
window.addEventListener("keyup",e=>{
    if(e.code==="ArrowUp")   keyUp=false;
    if(e.code==="ArrowDown") keyDown=false;
});

function getStickY(){
    const s=renderer.xr.getSession(); if(!s) return 0;
    for(const src of s.inputSources){
        if(src.handedness==="right"&&src.gamepad&&src.gamepad.axes.length>3){
            const y=src.gamepad.axes[3]; if(Math.abs(y)>0.15) return y;
        }
    }
    return 0;
}
function getRightGP(){
    const s=renderer.xr.getSession(); if(!s) return null;
    for(const src of s.inputSources){ if(src.handedness==="right"&&src.gamepad) return src.gamepad; }
    return null;
}

let prevA=false,prevB=false,prevTrig0=false,prevTrig1=false;

/* =====================================================
ANIMATION LOOP
===================================================== */
renderer.setAnimationLoop(()=>{
    const now=performance.now(), dt=now-prevTime;

    const isVR = renderer.xr.isPresenting;
    const isTour = CONFIG.gameMode === "tour";
    if(isTour || gamePhase==="playing") progress=(progress+velocity)%1;

    pos.copy(curve.getPointAt(progress)); pos.y+=0.2;
    const moving = isTour || gamePhase==="playing";
    realSpeed = moving ? pos.distanceTo(prevPos)/(dt/1000)*3.6 : 0;
    if(now-lastSpeedUI>100){ if(realSpeedUI) realSpeedUI.textContent=realSpeed.toFixed(0)+" km/h"; lastSpeedUI=now; }
    prevPos.copy(pos);
    train.position.copy(pos);
    if(now-lastMeter>100){ drawMeter(realSpeed); lastMeter=now; }
    tan.copy(curve.getTangentAt(progress));

    const ACCEL=0.0000001,DECEL=ACCEL*0.5;
    accelState=0;
    if(isTour || gamePhase==="playing"){
        if(!isTour && keyUp)  {velocity+=ACCEL*dt;accelState=1;}
        if(!isTour && keyDown){velocity-=DECEL*dt;accelState=-1;}
        const sy=getStickY();
        if(sy<-0.2){velocity+=ACCEL*dt*(-sy);accelState=1;}
        if(sy>0.2){velocity-=DECEL*dt*sy;accelState=-1;}
        const tg=accelState?1:0; glowStr+=(tg-glowStr)*0.15;
        velocity-=tan.y*1e-7*dt*SPEED;
        const TV=0.00012*SPEED;
        if(velocity>TV){const d=velocity-TV;velocity-=(d*d*0.0001+d*0.001)*dt;}
        velocity=Math.max(0.00005*SPEED,Math.min(0.0003*SPEED,velocity));
    }
    train.lookAt(lkAt.copy(pos).sub(tan));
    if(orbitControls) orbitControls.update();

    rotatingObjects.forEach(o=>{ if(o.visible) o.rotation.y+=0.005; });
    auras.forEach((a,i)=>{
        a.rotation.y+=0.002;
        a.position.y=ARTIFACT_HEIGHT+(-0.6+Math.sin(now*0.001+i)*0.04)*MODEL_SCALE;
        const s=(0.2+Math.sin(now*0.002+i)*0.005)*MODEL_SCALE; a.scale.set(s,s,s);
    });
    anchors.forEach((a,i)=>{const s=(1+Math.sin(now*0.002+i)*0.05)*MODEL_SCALE;a.scale.set(s,s,s);});
    scenelines.forEach((l,i)=>{const k=0.5+Math.sin(now*0.003+i)*0.5;l.material.color.setRGB(0.5*k,0.8*k,k);});
    clickSpheres.forEach((s,i)=>{const p=0.9+Math.sin(now*0.003+i*0.8)*0.1;s.scale.setScalar(p);});

    const showHUD = isVR && !isTour;
    HUD.mesh.visible = showHUD;
    SB.mesh.visible  = showHUD;

    const dtSec=dt/1000;
    for(let i=coinAnims.length-1;i>=0;i--){
        const c=coinAnims[i]; c.t+=dtSec; const tr=Math.min(c.t/c.dur,1);
        if(c.mode==="place"){
            const arc=Math.sin(tr*Math.PI)*2*MODEL_SCALE;
            c.mesh.position.lerpVectors(c.startPos,c.targetPos,tr); c.mesh.position.y+=arc;
            c.mesh.rotation.y+=0.15; c.mesh.rotation.z+=0.05;
            if(tr>=1&&!c.done){
                c.done=true;
                if(c.idx!==undefined&&permanentModels[c.idx]) permanentModels[c.idx].visible=true;
                scene.remove(c.mesh); coinAnims.splice(i,1);
            }
        } else if(c.mode==="fountain"){
            const g=9.8*MODEL_SCALE,e=c.t;
            c.mesh.position.set(c.startPos.x+c.vx*e,c.startPos.y+c.vy*e-0.5*g*e*e,c.startPos.z+c.vz*e);
            c.mesh.rotation.y+=0.2; c.mesh.rotation.x+=0.1;
            const peak=c.vy/g;
            if(e>peak){
                const fr=Math.max(0,1-(e-peak)/(c.dur-peak));
                c.mesh.traverse(ch=>{if(ch.isMesh&&ch.material){ch.material.transparent=true;ch.material.opacity=fr;}});
            }
            if(tr>=1){scene.remove(c.mesh);coinAnims.splice(i,1);}
        }
    }

    function updateLaser(ctrl, laserObj) {
        tmpMtx.identity().extractRotation(ctrl.matrixWorld);
        raycaster.ray.origin.setFromMatrixPosition(ctrl.matrixWorld);
        raycaster.ray.direction.set(0,0,-1).applyMatrix4(tmpMtx);
        const hits = raycaster.intersectObjects(clickSpheres, false);
        const hitDist = hits.length > 0 ? hits[0].distance : LASER_MAX_DIST;
        laserObj.line.geometry.setFromPoints([new THREE.Vector3(0,0,0), new THREE.Vector3(0,0,-hitDist)]);
        laserObj.mat.color.set(hits.length > 0 ? 0x00ff88 : 0xff3333);
        laserObj.dot.position.set(0, 0, -hitDist);
        laserObj.dot.visible = hits.length > 0;
        return hits;
    }

    let bA=false, bB=false, trigRight=false, trigLeft=false;
    let hitsRight=[], hitsLeft=[];
    laserRight.line.visible = false;
    laserLeft.line.visible  = false;

    if(!isTour && isVR){
        if(rightController){
            laserRight.line.visible = true;
            hitsRight = updateLaser(rightController, laserRight);
        }
        if(leftController){
            laserLeft.line.visible = true;
            hitsLeft  = updateLaser(leftController,  laserLeft);
        }
    }

    const xrSess = renderer.xr.getSession();
    if(xrSess){
        for(const src of xrSess.inputSources){
            if(!src.gamepad) continue;
            if(src.handedness==="right"){
                trigRight = src.gamepad.buttons[0]?.pressed ?? false;
                bA        = src.gamepad.buttons[4]?.pressed ?? false;
                bB        = src.gamepad.buttons[5]?.pressed ?? false;
            } else if(src.handedness==="left"){
                trigLeft  = src.gamepad.buttons[0]?.pressed ?? false;
            }
        }
    }

    if(!isTour){
        if(bA&&!prevA&&gamePhase==="idle") startCountdown();
        if(bB&&!prevB&&(gamePhase==="playing"||gamePhase==="countdown")) doForceEnd();
        if(trigRight&&!prevTrig0&&gamePhase==="playing"&&hitsRight.length>0) onSphereClick(hitsRight[0].object);
        if(trigLeft &&!prevTrig1&&gamePhase==="playing"&&hitsLeft.length>0)  onSphereClick(hitsLeft[0].object);
    }
    prevA=bA; prevB=bB; prevTrig0=trigRight; prevTrig1=trigLeft;

    renderer.render(scene,camera);
    prevTime=now;

    if(isTour && isVR && railSound.paused) {
        railSound.play().catch(()=>{});
    }
    if(!railSound.paused && now-lastSound>500){
        lastSound=now;
        const sr=velocity*1000*MODEL_SCALE;
        railSound.volume=CONFIG.curve==="trolley"?0.6:Math.min(1,sr);
        railSound.playbackRate=Math.max(0.5,1+sr*0.5);
    }
});

/* =====================================================
RESIZE
===================================================== */
window.addEventListener("resize",()=>{
    camera.aspect=window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth,window.innerHeight);
});
</script>
