<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width">
<title>1越前国府発掘2025VRコースター</title>
<style>
    body { margin:0; overflow:hidden; font-family:sans-serif; }
    #uiPanel {
        position:absolute; top:20px; left:20px; padding:15px;
        background:rgba(0,0,0,0.6); color:white; border-radius:8px; z-index:10;
    }
    #uiPanel h3 { margin:0 0 10px 0; font-size:14px; }
    #uiPanel span { margin:0 20px 0 0; }
    .uiRow { display:flex; align-items:center; justify-content:space-between; margin:20px 0; }
    .toggle { display:flex; }
    .toggle button { border:none; padding:16px 20px; min-width:125px; background:#777; color:white; cursor:pointer; }
    .toggle button:first-child { border-radius:4px 0 0 4px; }
    .toggle button:last-child  { border-radius:0 4px 4px 0; }
    .toggle button.active { background:#4caf50; }
    input[type=range] { min-width:200px; }
    #resetBtn {
        position:absolute; bottom:20px; right:20px; padding:10px 20px;
        background:rgba(180,30,30,0.85); color:white;
        border:2px solid rgba(255,100,100,0.7); border-radius:6px;
        cursor:pointer; font-size:14px; z-index:10;
    }
    #resetBtn:hover { background:rgba(220,50,50,0.95); }
</style>
</head>
<body>
<!-- rail sound: only plays while game is running, started via JS -->
<audio id="railSound" src="trolley_clatter.mp3" loop></audio>
<div id="uiPanel">
    <h3>COASTER CONTROL</h3>
    <div class="uiRow">
        <span>SPEED</span>
        <input id="speedSlider" type="range" min="0.1" max="2" step="0.1" value="1">
        <span id="speedValue"></span>
    </div>
    <!-- SOUND toggle removed: auto-managed by VR session + game phase -->
    <div class="uiRow">
        <span>CURVE</span>
        <div class="toggle" id="curveToggle">
            <button data-value="trolley">TROLLEY</button>
            <button data-value="coaster">COASTER</button>
        </div>
    </div>
    <div class="uiRow">
        <span>CAMERA</span>
        <div class="toggle" id="cameraToggle">
            <button data-value="ride">RIDE</button>
            <button data-value="outside">OUTSIDE</button>
        </div>
    </div>
    <div class="uiRow">
        <span>REAL SPEED</span>
        <span id="realSpeed">0 km/h</span>
    </div>
</div>
<button id="resetBtn">🗑 記録をリセット</button>

<script type="importmap">
{
    "imports":{
        "three":"https://code4fukui.github.io/three.js/build/three.module.js",
        "three/addons/":"https://code4fukui.github.io/three.js/examples/jsm/"
    }
}
</script>
<script type="module">
import * as THREE from "three";
import {Curve, addCoaster} from "https://code4fukui.github.io/vr-tojinbo/TojinboCoaster.js";
import {OrbitControls} from "three/addons/controls/OrbitControls.js";
import {VRButton} from "three/addons/webxr/VRButton.js";
import {GLTFLoader} from "three/addons/loaders/GLTFLoader.js";
import {XRControllerModelFactory} from "three/addons/webxr/XRControllerModelFactory.js";

/* =====================================================
CONSTANTS
===================================================== */
const MODEL_SCALE    = 5;
const ARTIFACT_SCALE = MODEL_SCALE;
const ARTIFACT_HEIGHT= 1.5 * MODEL_SCALE;
const RAIL_RADIUS    = 3.6 * MODEL_SCALE;
const RAIL_HEIGHT    = 1.7 * MODEL_SCALE;
const RAIL_OVAL      = 0.4;
const GAME_DURATION  = 60;
const LASER_MAX_DIST = 25;

/* =====================================================
CONFIG
===================================================== */
const CONFIG = {
    curve : localStorage.getItem("curve")  || "trolley",
    camera: localStorage.getItem("camera") || "ride",
    speed : parseFloat(localStorage.getItem("speed") || 0.5)
};
let SPEED = CONFIG.speed;

/* =====================================================
SCORES
===================================================== */
const LS_KEY = "vr_coaster_scores_v2";
function loadScores() {
    try { return JSON.parse(localStorage.getItem(LS_KEY) || "[]"); } catch(e) { return []; }
}
function saveScore(score) {
    const arr = loadScores();
    arr.push({ score, date: new Date().toLocaleDateString("ja-JP") });
    arr.sort((a,b)=>b.score-a.score); arr.splice(5);
    localStorage.setItem(LS_KEY, JSON.stringify(arr));
}
document.getElementById("resetBtn").addEventListener("click", () => {
    if (confirm("記録をリセットしますか？")) { localStorage.removeItem(LS_KEY); updateScoreBoard(); }
});

/* =====================================================
UI SETUP
===================================================== */
const railSound = document.getElementById("railSound");
railSound.pause();
railSound.volume = 0.6;

function setupToggle(id, key) {
    const btns = document.querySelectorAll(`#${id} button`);
    btns.forEach(btn => {
        if (btn.dataset.value === CONFIG[key]) btn.classList.add("active");
        btn.onclick = () => {
            btns.forEach(b=>b.classList.remove("active")); btn.classList.add("active");
            localStorage.setItem(key, btn.dataset.value); location.reload();
        };
    });
}
setupToggle("curveToggle","curve");
setupToggle("cameraToggle","camera");

const speedSlider  = document.getElementById("speedSlider");
const speedValueEl = document.getElementById("speedValue");
const realSpeedUI  = document.getElementById("realSpeed");
speedSlider.value = SPEED;
speedValueEl.textContent = SPEED.toFixed(1);
speedSlider.oninput = () => {
    SPEED = parseFloat(speedSlider.value);
    speedValueEl.textContent = SPEED.toFixed(1);
    localStorage.setItem("speed", SPEED);
};

/* =====================================================
WEB AUDIO — synthesised SFX
===================================================== */
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function sfxClick() {
    // Short bright ping (coin-like)
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.connect(g); g.connect(audioCtx.destination);
    o.type = "sine"; o.frequency.setValueAtTime(880, audioCtx.currentTime);
    o.frequency.exponentialRampToValueAtTime(1760, audioCtx.currentTime + 0.04);
    g.gain.setValueAtTime(0.6, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.18);
    o.start(); o.stop(audioCtx.currentTime + 0.18);
}

function sfxCountdown(n) {
    // n=1,2,3: descending beep; n=0: GO! (rising chord)
    if (n > 0) {
        const o = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        o.connect(g); g.connect(audioCtx.destination);
        o.type = "square";
        const freq = 220 + (4 - n) * 110; // 3→330 2→440 1→550
        o.frequency.setValueAtTime(freq, audioCtx.currentTime);
        g.gain.setValueAtTime(0.3, audioCtx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.25);
        o.start(); o.stop(audioCtx.currentTime + 0.25);
    } else {
        // GO! — triumphant ascending chord
        [440, 554, 659, 880].forEach((f, i) => {
            const o = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            o.connect(g); g.connect(audioCtx.destination);
            o.type = "triangle"; o.frequency.setValueAtTime(f, audioCtx.currentTime);
            g.gain.setValueAtTime(0, audioCtx.currentTime + i*0.04);
            g.gain.linearRampToValueAtTime(0.25, audioCtx.currentTime + i*0.04 + 0.02);
            g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + i*0.04 + 0.4);
            o.start(audioCtx.currentTime + i*0.04);
            o.stop(audioCtx.currentTime + i*0.04 + 0.4);
        });
    }
}

function sfxTimeUp() {
    // Descending fanfare
    [880, 660, 440, 330].forEach((f, i) => {
        const o = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        o.connect(g); g.connect(audioCtx.destination);
        o.type = "sawtooth"; o.frequency.setValueAtTime(f, audioCtx.currentTime + i*0.15);
        g.gain.setValueAtTime(0.35, audioCtx.currentTime + i*0.15);
        g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + i*0.15 + 0.35);
        o.start(audioCtx.currentTime + i*0.15);
        o.stop(audioCtx.currentTime + i*0.15 + 0.4);
    });
}

// Resume AudioContext on first user gesture
document.addEventListener("click", ()=>{ if(audioCtx.state==="suspended") audioCtx.resume(); }, {once:true});
document.addEventListener("touchstart", ()=>{ if(audioCtx.state==="suspended") audioCtx.resume(); }, {once:true});

/* =====================================================
SCENE / RENDERER
===================================================== */
const scene    = new THREE.Scene();
const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.xr.enabled = true;
document.body.appendChild(renderer.domElement);
document.body.appendChild(VRButton.createButton(renderer));

/* =====================================================
VR SESSION EVENTS
- On session start: force ride-mode camera, start rail sound
- On session end:   stop rail sound
===================================================== */
renderer.xr.addEventListener("sessionstart", () => {
    // Switch to ride mode if outside mode was selected
    if (CONFIG.camera !== "ride") {
        if (orbitControls) { orbitControls.dispose(); orbitControls = null; }
        scene.remove(camera);
        train.add(camera);
        camera.position.set(0, 0.2, 0);
        camera.rotation.set(0, 0, 0);
    }
    if (audioCtx.state === "suspended") audioCtx.resume();
    // NOTE: コントローラーの xrRig への移動は上の CONTROLLERS セクションの
    // sessionstart リスナーで処理済み
});

renderer.xr.addEventListener("sessionend", () => {
    railSound.pause();
});

/* =====================================================
CONTROLLERS
WebXR のコントローラーはデフォルトで XR 参照空間（ワールド原点）に
配置される。ライドモードではカメラが train の子として動くため、
コントローラーも train と同じ相対空間に乗せる必要がある。

解決策:
  xrRig という THREE.Group を train の子にする。
  セッション開始時にコントローラー・グリップを xrRig に移動する。
  これにより train の position / quaternion がそのままコントローラーの
  ワールド座標に加算され、「視点（頭）の相対位置に手が来る」動作になる。
===================================================== */
const ctrlModelFactory = new XRControllerModelFactory();

const grip0 = renderer.xr.getControllerGrip(0);
const grip1 = renderer.xr.getControllerGrip(1);
grip0.add(ctrlModelFactory.createControllerModel(grip0));
grip1.add(ctrlModelFactory.createControllerModel(grip1));

const ctrl0 = renderer.xr.getController(0); // right — laser
const ctrl1 = renderer.xr.getController(1); // left

// xrRig: コントローラーを乗せる Group。train.add() は TRAIN セクションで行う。
const xrRig = new THREE.Group();

// セッション開始時にコントローラー群を xrRig（train の子）へ移す
renderer.xr.addEventListener("sessionstart", () => {
    [ctrl0, ctrl1, grip0, grip1].forEach(obj => {
        if (obj.parent !== xrRig) {
            // scene や他の親から外して xrRig へ
            if (obj.parent) obj.parent.remove(obj);
            xrRig.add(obj);
        }
    });
});

/* -----  LASER  -----
   Attached to ctrl0 (target-ray space). Local forward = -Z.
   depthTest:false so it always renders on top.
----- */
const laserMat = new THREE.LineBasicMaterial({ color:0xff2222, depthTest:false, transparent:true, opacity:0.95 });
const laserGeo = new THREE.BufferGeometry().setFromPoints([
    new THREE.Vector3(0,0,0), new THREE.Vector3(0,0,-LASER_MAX_DIST)
]);
const laser = new THREE.Line(laserGeo, laserMat);
laser.frustumCulled = false; laser.renderOrder = 9999;
ctrl0.add(laser);

const laserDot = new THREE.Mesh(
    new THREE.SphereGeometry(0.012, 8, 8),
    new THREE.MeshBasicMaterial({ color:0xffffff, depthTest:false })
);
laserDot.renderOrder = 9999; laserDot.visible = false;
ctrl0.add(laserDot);

/* =====================================================
CAMERA
===================================================== */
const camera = new THREE.PerspectiveCamera(50, window.innerWidth/window.innerHeight, 0.1, 1000);
let orbitControls = null;

/* =====================================================
LIGHTS
===================================================== */
scene.add(new THREE.AmbientLight(0xffffff, 1.5));
const sun = new THREE.DirectionalLight(0xffffff, 1.2);
sun.position.set(80, 120, 60); scene.add(sun);

/* =====================================================
CURVE
===================================================== */
class MyCurve extends Curve {
    getPointAt(t) {
        t *= Math.PI*2;
        if (CONFIG.curve === "trolley") {
            return this.vector.set(Math.sin(t*3)*RAIL_RADIUS, RAIL_HEIGHT, Math.sin(t*2)*RAIL_RADIUS*RAIL_OVAL);
        }
        return this.vector.set(
            Math.sin(t*3)*Math.cos(t*4)*RAIL_RADIUS,
            (Math.sin(t*10)+Math.cos(t*17))*0.4*MODEL_SCALE+RAIL_HEIGHT,
            Math.sin(t)*Math.sin(t*4)*RAIL_RADIUS*RAIL_OVAL
        );
    }
}
const curve = new MyCurve();

/* =====================================================
COASTER SCENE MODEL (00101_kokufuhakkutsu3.glb)
addCoaster adds the environment model to scene.
We scale it to MODEL_SCALE and rotate.
===================================================== */
await addCoaster(scene, curve, null,
    "https://www.city.echizen.lg.jp/office/030/021/open-data-echizen_d/fil/00101_kokufuhakkutsu3.glb");

// Scale and rotate the environment root
let coasterRoot = null;
scene.traverse(o => {
    if (!coasterRoot && o.isMesh) {
        let root = o;
        while (root.parent && root.parent !== scene) root = root.parent;
        coasterRoot = root;
    }
});
if (coasterRoot) {
    coasterRoot.scale.set(MODEL_SCALE, MODEL_SCALE, MODEL_SCALE);
    coasterRoot.rotation.y = THREE.MathUtils.degToRad(-90);
}

/* =====================================================
ARTIFACT MODELS — hidden until first click
===================================================== */
const loader   = new GLTFLoader();
const BASE_URL = "https://raw.githubusercontent.com/echizencity/opendata/main/kokufuhakkutsu3/";
const ARTIFACTS = [
    {file:"model01_small.glb", x:-2.7, z:-0.5},
    {file:"model02_small.glb", x: 4.0, z: 2.4},
    {file:"model03_small.glb", x: 3.8, z:-0.7},
    {file:"model04_small.glb", x: 3.0, z:-2.2},
    {file:"model05_small.glb", x:   0, z:-1.5},
    {file:"model06_small.glb", x: 3.2, z: 2.2},
    {file:"model07_small.glb", x:  -2, z:  -1},
    {file:"model08_small.glb", x:-1.8, z: 1.2}
];

const artifactWorldPos = {};
const permanentModels  = {};
const rotatingObjects  = [];
const auras            = [];

function makeAuraTex() {
    const c=document.createElement("canvas"); c.width=64; c.height=256;
    const ctx=c.getContext("2d"), g=ctx.createLinearGradient(0,256,0,0);
    g.addColorStop(0,"rgba(100,200,255,0.4)"); g.addColorStop(0.4,"rgba(100,200,255,0.25)");
    g.addColorStop(0.7,"rgba(100,200,255,0.1)"); g.addColorStop(1,"rgba(100,200,255,0)");
    ctx.fillStyle=g; ctx.fillRect(0,0,64,256);
    const t=new THREE.CanvasTexture(c); t.colorSpace=THREE.SRGBColorSpace; return t;
}
const auraMat = new THREE.MeshBasicMaterial({map:makeAuraTex(),transparent:true,depthWrite:false,side:THREE.DoubleSide});
const auraGeo = new THREE.CylinderGeometry(1.2,0.6,12,32,1,true);

ARTIFACTS.forEach((data,idx) => {
    const wp = new THREE.Vector3(data.x*MODEL_SCALE, ARTIFACT_HEIGHT, data.z*MODEL_SCALE);
    artifactWorldPos[idx] = wp;
    const aura = new THREE.Mesh(auraGeo, auraMat);
    aura.position.copy(wp); scene.add(aura); auras.push(aura);
    loader.load(BASE_URL+data.file, gltf => {
        const obj = gltf.scene;
        obj.scale.set(ARTIFACT_SCALE, ARTIFACT_SCALE, ARTIFACT_SCALE);
        obj.position.copy(wp);
        obj.visible = false;
        scene.add(obj); rotatingObjects.push(obj); permanentModels[idx] = obj;
    });
});

/* =====================================================
EXPLANATION PANELS / ANCHORS / LINES
===================================================== */
const texLoader  = new THREE.TextureLoader();
const IMAGE_BASE = "https://raw.githubusercontent.com/echizencity/opendata/main/kokufuhakkutsu3/";

function addInfoPanel(file,x,y,z,rx,ry,rz,w,h) {
    texLoader.load(file, tex => {
        tex.colorSpace=THREE.SRGBColorSpace;
        const grp=new THREE.Group();
        grp.position.set(x*MODEL_SCALE,y*MODEL_SCALE,z*MODEL_SCALE); scene.add(grp);
        const m=new THREE.MeshBasicMaterial({map:tex,transparent:true,toneMapped:false,side:THREE.DoubleSide});
        const mesh=new THREE.Mesh(new THREE.PlaneGeometry(w*MODEL_SCALE,h*MODEL_SCALE),m);
        mesh.rotation.order="ZYX";
        mesh.rotation.set(THREE.MathUtils.degToRad(rx),THREE.MathUtils.degToRad(ry),THREE.MathUtils.degToRad(rz));
        grp.add(mesh);
    });
}
addInfoPanel("https://echizencity.github.io/opendata/kokufuhakkutsu3/40000_kokufuhakkutsu3.png", 3,3.5,0,0,-90,70,3.2,4);
addInfoPanel("https://echizencity.github.io/opendata/kokufuhakkutsu3/40000_kokufuhakkutsu3.png",-3,3.5,0,0,90,-70,3.2,4);

const EXPLAIN_PTS=[
    ["40100_kokufuhakkutsu3.png",-2.7,-0.5,-0.2,-2.0,  0],
    ["40200_kokufuhakkutsu3.png", 4.0, 2.4, 0.0, 0.1,180],
    ["40300_kokufuhakkutsu3.png", 3.8,-0.7, 0.0,-1.8,  0],
    ["40400_kokufuhakkutsu3.png", 3.0,-2.2,-0.8,-0.3,  0],
    ["40500_kokufuhakkutsu3.png",   0,-1.5, 0.1,-1.0,  0],
    ["40600_kokufuhakkutsu3.png", 3.2, 2.2,-0.8, 0.3,180],
    ["40700_kokufuhakkutsu3.png",-2.0,-1.0, 0.6,-1.5,  0],
    ["40800_kokufuhakkutsu3.png",-1.8, 1.2, 0.0, 1.3,180]
];

const anchors=[], scenelines=[], clickSpheres=[];
const SPHERE_R  = 0.20*MODEL_SCALE;
const sphereGeo = new THREE.SphereGeometry(SPHERE_R,24,24);
const panelGeo  = new THREE.PlaneGeometry(1.5*MODEL_SCALE,1.5*MODEL_SCALE);
const anchorGeo = new THREE.SphereGeometry(0.05,16,16);
const anchorMat = new THREE.MeshBasicMaterial({color:0x66ccff});

EXPLAIN_PTS.forEach((data,idx)=>{
    const [file,x,z,ox,oz,rot]=data;
    const anchor=new THREE.Mesh(anchorGeo,anchorMat);
    anchor.position.set(x*MODEL_SCALE,1.25*MODEL_SCALE,z*MODEL_SCALE);
    scene.add(anchor); anchors.push(anchor);

    const sphMat=new THREE.MeshBasicMaterial({color:0xffdd33,transparent:true,opacity:0.78});
    const sph=new THREE.Mesh(sphereGeo,sphMat);
    sph.position.set(x*MODEL_SCALE,1.25*MODEL_SCALE,z*MODEL_SCALE);
    sph.userData.artifactIndex=idx; scene.add(sph); clickSpheres.push(sph);

    texLoader.load(IMAGE_BASE+file,tex=>{
        tex.colorSpace=THREE.SRGBColorSpace;
        const m=new THREE.MeshBasicMaterial({map:tex,transparent:true,toneMapped:false,side:THREE.DoubleSide});
        const mesh=new THREE.Mesh(panelGeo,m);
        mesh.position.set((x+ox)*MODEL_SCALE,2.9*MODEL_SCALE,(z+oz)*MODEL_SCALE);
        mesh.rotation.y=THREE.MathUtils.degToRad(rot); scene.add(mesh);
        const pts=[new THREE.Vector3(x*MODEL_SCALE,1.25*MODEL_SCALE,z*MODEL_SCALE),
                   new THREE.Vector3((x+ox)*MODEL_SCALE,2.2*MODEL_SCALE,(z+oz)*MODEL_SCALE)];
        const ln=new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts),
                                new THREE.LineBasicMaterial({color:0x88ccff}));
        scene.add(ln); scenelines.push(ln);
    });
});

/* =====================================================
TRAIN
===================================================== */
const train=new THREE.Mesh(
    new THREE.BoxGeometry(0.1*MODEL_SCALE,0.1*MODEL_SCALE,0.2*MODEL_SCALE),
    new THREE.MeshBasicMaterial({color:15628151})
);
scene.add(train);

// xrRig を train の子にする（コントローラーが train の相対座標に乗る）
train.add(xrRig);

// Speed meter
const mCv=document.createElement("canvas"); mCv.width=256; mCv.height=128;
const mCtx=mCv.getContext("2d"), mTex=new THREE.CanvasTexture(mCv);
const mMesh=new THREE.Mesh(new THREE.PlaneGeometry(0.3,0.18),new THREE.MeshBasicMaterial({map:mTex,transparent:true}));
mMesh.position.set(0,0.4,-0.45); mMesh.rotation.x=THREE.MathUtils.degToRad(-90);
train.add(mMesh);
let accelState=0,glowStr=0,lastMeter=0;
function drawMeter(speed){
    mCtx.clearRect(0,0,256,128);
    mCtx.fillStyle="rgba(0,0,0,0.65)"; mCtx.fillRect(0,0,256,128);
    if(accelState!==0){
        const gc=accelState===1?"255,80,80":"80,120,255";
        const g=mCtx.createRadialGradient(128,64,10,128,64,120);
        g.addColorStop(0,`rgba(${gc},${glowStr*0.8})`); g.addColorStop(1,"rgba(0,0,0,0)");
        mCtx.fillStyle=g; mCtx.fillRect(0,0,256,128);
    }
    mCtx.strokeStyle="#66ccff"; mCtx.lineWidth=4; mCtx.strokeRect(0,0,256,128);
    mCtx.fillStyle="white"; mCtx.font="bold 40px sans-serif"; mCtx.textAlign="center";
    mCtx.fillText(speed.toFixed(0)+" km/h",128,70); mTex.needsUpdate=true;
}

/* =====================================================
CAMERA MODE (browser selection)
In VR the sessionstart handler always ensures ride mode.
===================================================== */
if (CONFIG.camera==="ride") {
    train.add(camera);
    camera.position.set(0,0.2,0);
} else {
    orbitControls=new OrbitControls(camera,renderer.domElement);
    orbitControls.listenToKeyEvents(window);
    camera.position.set(0,4*MODEL_SCALE,20*MODEL_SCALE);
}

/* =====================================================
CURVE START INFO (for gate placement)
===================================================== */
const startCurvePos = curve.getPointAt(0).clone();
startCurvePos.y += 0.2;
const startTangent  = curve.getTangentAt(0).clone().normalize();

/* =====================================================
GATE
Placed at the rail t=0 position, spanning the rail width.
Scale matches MODEL_SCALE world — pillars are world units.
Gate faces perpendicular to the rail tangent so you ride through it.
===================================================== */
const gateGrp = new THREE.Group();
// Y position: ground = RAIL_HEIGHT - some offset; place at RAIL_HEIGHT level
gateGrp.position.set(startCurvePos.x, RAIL_HEIGHT - MODEL_SCALE*1.7, startCurvePos.z);
// Rotate so the gate spans across the rail direction
const gateYaw = Math.atan2(startTangent.x, startTangent.z);
gateGrp.rotation.y = gateYaw;
scene.add(gateGrp);

// Gate proportions scaled to world (MODEL_SCALE=5)
const G_HALF  = 1.5 * MODEL_SCALE;  // half-span across the rail
const G_H     = 3.5 * MODEL_SCALE;  // total height
const G_PW    = 0.3 * MODEL_SCALE;  // pillar width

const pillarM = new THREE.MeshBasicMaterial({color:0x996622});
[-G_HALF, G_HALF].forEach(s=>{
    const p=new THREE.Mesh(new THREE.BoxGeometry(G_PW,G_H,G_PW),pillarM);
    p.position.set(s, G_H/2, 0); gateGrp.add(p);
});
const crossbar=new THREE.Mesh(
    new THREE.BoxGeometry(G_HALF*2+G_PW, 0.3*MODEL_SCALE, 0.3*MODEL_SCALE),
    new THREE.MeshBasicMaterial({color:0xcc8833})
);
crossbar.position.set(0, G_H, 0); gateGrp.add(crossbar);

// Lantern decorations on pillars
const lanternM = new THREE.MeshBasicMaterial({color:0xff6600});
[-G_HALF, G_HALF].forEach(s=>{
    const l=new THREE.Mesh(new THREE.BoxGeometry(G_PW*1.8, 0.4*MODEL_SCALE, G_PW*1.8), lanternM);
    l.position.set(s, G_H - 0.4*MODEL_SCALE, 0); gateGrp.add(l);
});

// Gate sign canvas
const gSignCv=document.createElement("canvas"); gSignCv.width=1024; gSignCv.height=256;
const gSignCtx=gSignCv.getContext("2d"), gSignTex=new THREE.CanvasTexture(gSignCv);
function drawGateSign(line1,line2="",col="#ffee44"){
    gSignCtx.clearRect(0,0,1024,256);
    gSignCtx.fillStyle="rgba(0,0,0,0.82)"; gSignCtx.fillRect(0,0,1024,256);
    gSignCtx.strokeStyle="#ffee44"; gSignCtx.lineWidth=8; gSignCtx.strokeRect(8,8,1008,240);
    gSignCtx.fillStyle=col; gSignCtx.textAlign="center";
    if(line2){
        gSignCtx.font="bold 80px sans-serif"; gSignCtx.fillText(line1,512,112);
        gSignCtx.font="bold 56px sans-serif"; gSignCtx.fillText(line2,512,196);
    } else {
        gSignCtx.font="bold 90px sans-serif"; gSignCtx.fillText(line1,512,153);
    }
    gSignTex.needsUpdate=true;
}
drawGateSign("🏛 スタートゲート 🏛");
const gSignMesh=new THREE.Mesh(
    new THREE.PlaneGeometry(G_HALF*2, 0.8*MODEL_SCALE),
    new THREE.MeshBasicMaterial({map:gSignTex,transparent:true,side:THREE.DoubleSide})
);
gSignMesh.position.set(0, G_H+0.05*MODEL_SCALE, 0.05);
gateGrp.add(gSignMesh);

/* =====================================================
HUD PANELS — children of train (camera rig)
===================================================== */
function makeHUDPanel(cw,ch,pw,ph,lx,ly,lz){
    const cv=document.createElement("canvas"); cv.width=cw; cv.height=ch;
    const ctx=cv.getContext("2d"), tex=new THREE.CanvasTexture(cv);
    const mesh=new THREE.Mesh(
        new THREE.PlaneGeometry(pw,ph),
        new THREE.MeshBasicMaterial({map:tex,transparent:true,depthTest:false,depthWrite:false})
    );
    mesh.position.set(lx,ly,lz); mesh.renderOrder=999;
    return {cv,ctx,tex,mesh};
}
const HUD=makeHUDPanel(1024,512,  1.0,0.5,   0.56,0.10,-0.9);
const SB =makeHUDPanel(1024,1024, 0.8,0.8,  -0.56,0.10,-0.9);
const OV =makeHUDPanel(1024,512,  1.8,0.9,   0.00,0.15,-1.0);
OV.mesh.renderOrder=1000; OV.mesh.visible=false;
train.add(HUD.mesh); train.add(SB.mesh); train.add(OV.mesh);

// Darkness overlay
function makeDarkPlane(rx){
    const m=new THREE.Mesh(new THREE.PlaneGeometry(2000,2000),
        new THREE.MeshBasicMaterial({color:0,transparent:true,opacity:0,depthWrite:false,side:THREE.DoubleSide}));
    m.rotation.x=rx; return m;
}
const dark1=makeDarkPlane(-Math.PI/2); dark1.position.y=500; scene.add(dark1);
const dark2=makeDarkPlane( Math.PI/2); dark2.position.y=-100; scene.add(dark2);
function setDark(a){ dark1.material.opacity=dark2.material.opacity=Math.max(0,Math.min(1,a)); }

function rrect(ctx,x,y,w,h,r){
    ctx.beginPath();
    ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.arcTo(x+w,y,x+w,y+r,r);
    ctx.lineTo(x+w,y+h-r);ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
    ctx.lineTo(x+r,y+h);ctx.arcTo(x,y+h,x,y+h-r,r);
    ctx.lineTo(x,y+r);ctx.arcTo(x,y,x+r,y,r);ctx.closePath();
}

/* =====================================================
GAME STATE
===================================================== */
let gamePhase="idle", gameScore=0, gameTimeLeft=GAME_DURATION;
const clickCounts={};
let mainInterval=null, phaseTimeout=null;
function clearTimers(){
    if(mainInterval){clearInterval(mainInterval);mainInterval=null;}
    if(phaseTimeout){clearTimeout(phaseTimeout);phaseTimeout=null;}
}

function updateHUD(){
    const {ctx,tex}=HUD;
    ctx.clearRect(0,0,1024,512);
    ctx.fillStyle="rgba(0,0,0,0.78)"; rrect(ctx,8,8,1008,496,28); ctx.fill();
    ctx.fillStyle="#ffee44"; ctx.font="bold 64px sans-serif"; ctx.textAlign="left";
    ctx.fillText("SCORE",40,88);
    ctx.fillStyle="white"; ctx.font="bold 168px sans-serif";
    ctx.fillText(String(gameScore),40,256);
    const ratio=gameTimeLeft/GAME_DURATION;
    const bc=ratio>0.4?"#44ee88":ratio>0.2?"#ffcc22":"#ff4444";
    ctx.fillStyle=bc; ctx.font="bold 54px sans-serif"; ctx.textAlign="right";
    ctx.fillText(`⏱ ${gameTimeLeft}s`,984,340);
    ctx.fillStyle="rgba(255,255,255,0.15)"; ctx.fillRect(40,370,944,38);
    ctx.fillStyle=bc; ctx.fillRect(40,370,Math.max(0,944*ratio),38);
    if(gamePhase==="idle"){
        ctx.fillStyle="#88ffcc"; ctx.font="bold 34px sans-serif"; ctx.textAlign="center";
        ctx.fillText("Aボタン: スタート  Bボタン: 強制終了",512,468);
    }
    tex.needsUpdate=true;
}
function updateScoreBoard(){
    const {ctx,tex}=SB;
    ctx.clearRect(0,0,1024,1024);
    ctx.fillStyle="rgba(0,0,0,0.78)"; rrect(ctx,8,8,1008,1008,28); ctx.fill();
    ctx.fillStyle="#ffcc44"; ctx.font="bold 72px sans-serif"; ctx.textAlign="center";
    ctx.fillText("🏆 TOP 5",512,88);
    ctx.strokeStyle="rgba(255,204,68,0.4)"; ctx.lineWidth=3;
    ctx.beginPath(); ctx.moveTo(60,115); ctx.lineTo(964,115); ctx.stroke();
    const scores=loadScores();
    if(!scores.length){
        ctx.fillStyle="#aaa"; ctx.font="50px sans-serif"; ctx.fillText("記録なし",512,280);
    } else {
        const medals=["🥇","🥈","🥉","4.","5."];
        scores.forEach((s,i)=>{
            const y=185+i*162;
            ctx.fillStyle=i===0?"#ffd700":i===1?"#c0c0c0":i===2?"#cd7f32":"#88ccff";
            ctx.font=`bold ${i===0?72:60}px sans-serif`; ctx.textAlign="left";
            ctx.fillText(`${medals[i]} ${s.score}pt`,60,y);
            ctx.fillStyle="#777"; ctx.font="36px sans-serif"; ctx.textAlign="right";
            ctx.fillText(s.date,964,y);
        });
    }
    tex.needsUpdate=true;
}
function showOverlay(big,small=""){
    const {ctx,tex}=OV;
    ctx.clearRect(0,0,1024,512);
    ctx.fillStyle="rgba(0,0,0,0.90)"; rrect(ctx,10,10,1004,492,40); ctx.fill();
    ctx.strokeStyle="rgba(255,220,50,0.8)"; ctx.lineWidth=8; rrect(ctx,10,10,1004,492,40); ctx.stroke();
    ctx.fillStyle="white"; ctx.textAlign="center";
    if(small){
        ctx.font="bold 180px sans-serif"; ctx.fillText(big,512,285);
        ctx.fillStyle="#ffee44"; ctx.font="bold 60px sans-serif"; ctx.fillText(small,512,400);
    } else {
        ctx.font="bold 220px sans-serif"; ctx.fillText(big,512,330);
    }
    tex.needsUpdate=true; OV.mesh.visible=true;
}
function hideOverlay(){ OV.mesh.visible=false; }
updateHUD(); updateScoreBoard();

/* =====================================================
VIBRATION
===================================================== */
function vibrate(dur,intensity){
    const session=renderer.xr.getSession(); if(!session) return;
    for(const src of session.inputSources){
        if(src.handedness==="right"&&src.gamepad){
            const a=src.gamepad.hapticActuators;
            if(a&&a.length>0) a[0].pulse(intensity,dur);
        }
    }
}

/* =====================================================
GAME LOGIC
===================================================== */
let progress=0, velocity=0.0001;

function teleportToStart(){
    progress=0; velocity=0.0001;
    const p=curve.getPointAt(0).clone(); p.y+=0.2;
    train.position.copy(p);
}

function startCountdown(){
    if(gamePhase!=="idle") return;
    clearTimers();
    vibrate(120,0.5);
    gamePhase="countdown";
    gameScore=0; gameTimeLeft=GAME_DURATION;
    for(const k in clickCounts) delete clickCounts[k];
    teleportToStart(); setDark(0);
    drawGateSign("⏳ まもなくスタート！","準備してください","#ffcc22");
    updateHUD();

    let cd=3;
    function tick(){
        if(cd>0){
            sfxCountdown(cd);
            showOverlay(String(cd),"準備！");
            cd--; phaseTimeout=setTimeout(tick,1000);
        } else { hideOverlay(); doStart(); }
    }
    sfxCountdown(cd);
    showOverlay(String(cd),"準備！"); cd=2;
    phaseTimeout=setTimeout(tick,1000);
}

function doStart(){
    gamePhase="playing";
    sfxCountdown(0); // GO! sound
    drawGateSign("🎮 ゲーム中！","","#ff4444");
    updateHUD();
    vibrate(300,0.7);
    // Start rail sound now
    railSound.play().catch(()=>{});
    mainInterval=setInterval(()=>{
        gameTimeLeft--;
        updateHUD();
        if(gameTimeLeft<=0){ clearInterval(mainInterval); mainInterval=null; doEnd(); }
    },1000);
}

function doEnd(){
    clearTimers();
    gamePhase="result";
    sfxTimeUp();
    vibrate(600,1.0);
    railSound.pause();
    if(gameScore>0) saveScore(gameScore);
    updateScoreBoard(); setDark(0.75);
    showOverlay(`${gameScore}pt`,"🎉 ゲーム終了！お疲れ様でした！");
    drawGateSign("🏛 スタートゲート 🏛");
    cleanCoins();
    phaseTimeout=setTimeout(()=>{
        gamePhase="idle"; gameScore=0; gameTimeLeft=GAME_DURATION;
        setDark(0); hideOverlay(); teleportToStart(); updateHUD();
        drawGateSign("🏛 スタートゲート 🏛");
    },10000);
}

function doForceEnd(){
    if(gamePhase!=="playing"&&gamePhase!=="countdown") return;
    clearTimers();
    vibrate(200,0.8);
    gamePhase="forceend";
    railSound.pause();
    cleanCoins(); setDark(0.75);
    showOverlay("強制終了","スコアは記録されません");
    drawGateSign("🏛 スタートゲート 🏛");
    phaseTimeout=setTimeout(()=>{
        gamePhase="idle"; gameScore=0; gameTimeLeft=GAME_DURATION;
        setDark(0); hideOverlay(); teleportToStart(); updateHUD();
        drawGateSign("🏛 スタートゲート 🏛");
    },3000);
}

/* =====================================================
COIN ANIMATIONS
===================================================== */
const coinAnims=[];
function cleanCoins(){ coinAnims.forEach(c=>{ if(c.mesh) scene.remove(c.mesh); }); coinAnims.length=0; }

function spawnCoin(idx,isFirst){
    const sp=artifactWorldPos[idx]; if(!sp) return;
    loader.load(BASE_URL+ARTIFACTS[idx].file,gltf=>{
        const coin=gltf.scene;
        coin.scale.set(ARTIFACT_SCALE*0.7,ARTIFACT_SCALE*0.7,ARTIFACT_SCALE*0.7);
        coin.position.copy(sp); scene.add(coin);
        if(isFirst){
            coinAnims.push({mesh:coin,idx,mode:"place",startPos:sp.clone(),targetPos:sp.clone(),t:0,dur:1.2,done:false});
        } else {
            const ang=Math.random()*Math.PI*2, spd=(0.5+Math.random()*1.2)*MODEL_SCALE;
            coinAnims.push({mesh:coin,mode:"fountain",startPos:sp.clone(),
                vx:Math.cos(ang)*spd,vz:Math.sin(ang)*spd,vy:(2.0+Math.random()*1.5)*MODEL_SCALE,t:0,dur:2.0});
        }
    });
}

/* =====================================================
SPHERE CLICK
===================================================== */
function onSphereClick(sphere){
    if(gamePhase!=="playing") return;
    const idx=sphere.userData.artifactIndex;
    const cnt=clickCounts[idx]||0, first=cnt===0;
    clickCounts[idx]=cnt+1;
    gameScore+=first?5:1; updateHUD();
    sphere.material.color.set(first?0xff4444:0xffffff);
    setTimeout(()=>sphere.material.color.set(0xffdd33),160);
    sfxClick(); vibrate(80,0.9);
    spawnCoin(idx,first);
}

/* =====================================================
MOTION
===================================================== */
let prevTime=performance.now(), keyUp=false, keyDown=false;
const pos=new THREE.Vector3(), tan=new THREE.Vector3(), lkAt=new THREE.Vector3();
let prevPos=new THREE.Vector3(), realSpeed=0;
let lastSpeedUI=0, lastSound=0;
const raycaster=new THREE.Raycaster(), tmpMtx=new THREE.Matrix4();

window.addEventListener("keydown",e=>{
    if(e.code==="ArrowUp")   keyUp=true;
    if(e.code==="ArrowDown") keyDown=true;
    if(e.code==="KeyS"&&gamePhase==="idle") startCountdown();
    if(e.code==="KeyE") doForceEnd();
});
window.addEventListener("keyup",e=>{
    if(e.code==="ArrowUp")   keyUp=false;
    if(e.code==="ArrowDown") keyDown=false;
});

function getStickY(){
    const s=renderer.xr.getSession(); if(!s) return 0;
    for(const src of s.inputSources){
        if(src.handedness==="right"&&src.gamepad&&src.gamepad.axes.length>3){
            const y=src.gamepad.axes[3]; if(Math.abs(y)>0.15) return y;
        }
    }
    return 0;
}
function getRightGP(){
    const s=renderer.xr.getSession(); if(!s) return null;
    for(const src of s.inputSources){ if(src.handedness==="right"&&src.gamepad) return src.gamepad; }
    return null;
}

let prevA=false,prevB=false,prevTrig=false;

/* =====================================================
ANIMATION LOOP
===================================================== */
renderer.setAnimationLoop(()=>{
    const now=performance.now(), dt=now-prevTime;

    // Train moves only while playing
    if(gamePhase==="playing") progress=(progress+velocity)%1;

    pos.copy(curve.getPointAt(progress)); pos.y+=0.2;
    realSpeed=gamePhase==="playing"?pos.distanceTo(prevPos)/(dt/1000)*3.6:0;
    if(now-lastSpeedUI>100){ realSpeedUI.textContent=realSpeed.toFixed(0)+" km/h"; lastSpeedUI=now; }
    prevPos.copy(pos);
    train.position.copy(pos);
    if(now-lastMeter>100){ drawMeter(realSpeed); lastMeter=now; }
    tan.copy(curve.getTangentAt(progress));

    const ACCEL=0.0000001,DECEL=ACCEL*0.5;
    accelState=0;
    if(gamePhase==="playing"){
        if(keyUp){velocity+=ACCEL*dt;accelState=1;}
        if(keyDown){velocity-=DECEL*dt;accelState=-1;}
        const sy=getStickY();
        if(sy<-0.2){velocity+=ACCEL*dt*(-sy);accelState=1;}
        if(sy>0.2){velocity-=DECEL*dt*sy;accelState=-1;}
        const tg=accelState?1:0; glowStr+=(tg-glowStr)*0.15;
        velocity-=tan.y*1e-7*dt*SPEED;
        const TV=0.00012*SPEED;
        if(velocity>TV){const d=velocity-TV;velocity-=(d*d*0.0001+d*0.001)*dt;}
        velocity=Math.max(0.00005*SPEED,Math.min(0.0003*SPEED,velocity));
    }
    train.lookAt(lkAt.copy(pos).sub(tan));
    if(orbitControls) orbitControls.update();

    rotatingObjects.forEach(o=>{ if(o.visible) o.rotation.y+=0.005; });
    auras.forEach((a,i)=>{
        a.rotation.y+=0.002;
        a.position.y=ARTIFACT_HEIGHT+(-0.6+Math.sin(now*0.001+i)*0.04)*MODEL_SCALE;
        const s=(0.2+Math.sin(now*0.002+i)*0.005)*MODEL_SCALE; a.scale.set(s,s,s);
    });
    anchors.forEach((a,i)=>{const s=(1+Math.sin(now*0.002+i)*0.05)*MODEL_SCALE;a.scale.set(s,s,s);});
    scenelines.forEach((l,i)=>{const k=0.5+Math.sin(now*0.003+i)*0.5;l.material.color.setRGB(0.5*k,0.8*k,k);});
    clickSpheres.forEach((s,i)=>{const p=0.9+Math.sin(now*0.003+i*0.8)*0.1;s.scale.setScalar(p);});

    // Coin animations
    const dtSec=dt/1000;
    for(let i=coinAnims.length-1;i>=0;i--){
        const c=coinAnims[i]; c.t+=dtSec; const tr=Math.min(c.t/c.dur,1);
        if(c.mode==="place"){
            const arc=Math.sin(tr*Math.PI)*2*MODEL_SCALE;
            c.mesh.position.lerpVectors(c.startPos,c.targetPos,tr); c.mesh.position.y+=arc;
            c.mesh.rotation.y+=0.15; c.mesh.rotation.z+=0.05;
            if(tr>=1&&!c.done){
                c.done=true;
                if(c.idx!==undefined&&permanentModels[c.idx]) permanentModels[c.idx].visible=true;
                scene.remove(c.mesh); coinAnims.splice(i,1);
            }
        } else if(c.mode==="fountain"){
            const g=9.8*MODEL_SCALE,e=c.t;
            c.mesh.position.set(c.startPos.x+c.vx*e,c.startPos.y+c.vy*e-0.5*g*e*e,c.startPos.z+c.vz*e);
            c.mesh.rotation.y+=0.2; c.mesh.rotation.x+=0.1;
            const peak=c.vy/g;
            if(e>peak){
                const fr=Math.max(0,1-(e-peak)/(c.dur-peak));
                c.mesh.traverse(ch=>{if(ch.isMesh&&ch.material){ch.material.transparent=true;ch.material.opacity=fr;}});
            }
            if(tr>=1){scene.remove(c.mesh);coinAnims.splice(i,1);}
        }
    }

    // Laser + buttons
    tmpMtx.identity().extractRotation(ctrl0.matrixWorld);
    raycaster.ray.origin.setFromMatrixPosition(ctrl0.matrixWorld);
    raycaster.ray.direction.set(0,0,-1).applyMatrix4(tmpMtx);
    const hits=raycaster.intersectObjects(clickSpheres,false);
    const hitDist=hits.length>0?hits[0].distance:LASER_MAX_DIST;
    laser.geometry.setFromPoints([new THREE.Vector3(0,0,0),new THREE.Vector3(0,0,-hitDist)]);
    laserMat.color.set(hits.length>0?0x00ff88:0xff3333);
    laserDot.position.set(0,0,-hitDist); laserDot.visible=hits.length>0;

    const gp=getRightGP();
    let bA=false,bB=false,bT=false;
    if(gp){
        bT=gp.buttons[0]?.pressed??false;
        bA=gp.buttons[4]?.pressed??false;
        bB=gp.buttons[5]?.pressed??false;
    }
    if(bA&&!prevA&&gamePhase==="idle") startCountdown();
    if(bB&&!prevB&&(gamePhase==="playing"||gamePhase==="countdown")) doForceEnd();
    if(bT&&!prevTrig&&gamePhase==="playing"&&hits.length>0) onSphereClick(hits[0].object);
    prevA=bA; prevB=bB; prevTrig=bT;

    renderer.render(scene,camera);
    prevTime=now;

    // Rail sound playback rate (only when actively playing)
    if(!railSound.paused&&now-lastSound>500){
        lastSound=now;
        const sr=velocity*1000*MODEL_SCALE;
        railSound.volume=CONFIG.curve==="trolley"?0.6:Math.min(1,sr);
        railSound.playbackRate=Math.max(0.5,1+sr*0.5);
    }
});

/* =====================================================
RESIZE
===================================================== */
window.addEventListener("resize",()=>{
    camera.aspect=window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth,window.innerHeight);
});
</script>
