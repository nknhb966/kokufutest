
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width">
<title>Echizen kokufu VR Trolley</title>

<style>
    body{
        margin:0;
        overflow:hidden;
    }

    #uiPanel{
        position:absolute;
        top:20px;
        left:20px;
        padding:15px;
        background:rgba(0,0,0,0.6);
        color:white;
        font-family:sans-serif;
        border-radius:8px;
    }

    #uiPanel h3{
        margin:0 0 10px 0;
        font-size:14px;
    }

    #uiPanel span{
        margin:0 20px 0 0;
    }

    .uiRow{
        display:flex;
        align-items:center;
        justify-content:space-between;
        margin:20px 0;
    }

    .toggle{
        display:flex;
    }

    .toggle button{
        border:none;
        padding:16px 20px;
        min-width:220px;
        background:#777;
        color:white;
        cursor:pointer;
    }

    .toggle button:first-child{
        border-radius:4px 0 0 4px;
    }

    .toggle button:last-child{
        border-radius:0 4px 4px 0;
    }

    .toggle button.active{
        background:#4caf50;
    }

    input[type=range]{
        width:360px;
    }
</style>
</head>

<body>

<audio id="railSound" src="trolley_clatter.mp3" loop></audio>

<div id="uiPanel">

    <h3>COASTER CONTROL</h3>

    <div class="uiRow">
        <span>SPEED</span>
        <input id="speedSlider" type="range" min="0.1" max="1" step="0.1" value="1">
        <span id="speedValue"></span>
    </div>

    <div class="uiRow">
        <span>SOUND</span>
        <div class="toggle" id="soundToggle">
            <button data-value="off">OFF</button>
            <button data-value="on">ON</button>
        </div>
    </div>

    <div class="uiRow">
        <span>CURVE</span>
        <div class="toggle" id="curveToggle">
            <button data-value="trolley">TROLLEY</button>
            <button data-value="coaster">COASTER</button>
        </div>
    </div>

    <div class="uiRow">
        <span>CAMERA</span>
        <div class="toggle" id="cameraToggle">
            <button data-value="ride">RIDE</button>
            <button data-value="outside">OUTSIDE</button>
        </div>
    </div>

</div>

<script type="importmap">
    {
        "imports":{
            "three":"https://code4fukui.github.io/three.js/build/three.module.js",
            "three/addons/":"https://code4fukui.github.io/three.js/examples/jsm/"
        }
    }
</script>

<script type="module">

import * as THREE from "three";
import {Curve,addCoaster} from "https://code4fukui.github.io/vr-tojinbo/TojinboCoaster.js";
import {OrbitControls} from "three/addons/controls/OrbitControls.js";
import {VRButton} from "three/addons/webxr/VRButton.js";
import {GLTFLoader} from "three/addons/loaders/GLTFLoader.js";

////////////////////////////////////////////////////////
//// 設定
////////////////////////////////////////////////////////

const MODEL_SCALE = 5;                   // 遺跡サイズ
const ARTIFACT_SCALE = MODEL_SCALE;      // 出土品サイズ
const ARTIFACT_HEIGHT = MODEL_SCALE;     // 出土品高さ

const RAIL_RADIUS = 8 * MODEL_SCALE;     // レール半径
const RAIL_HEIGHT = 2 * MODEL_SCALE;     // コース高さ
const RAIL_OVAL = 0.3;                   // 楕円率

////////////////////////////////////////////////////////
//// localStorage + CONFIG
////////////////////////////////////////////////////////

const CONFIG = {
    sound  : "off",
    curve  : localStorage.getItem("curve")  || "trolley",
    camera : localStorage.getItem("camera") || "ride",
    speed  : parseFloat(localStorage.getItem("speed") || 0.5)
};

let SPEED = CONFIG.speed;

////////////////////////////////////////////////////////
//// UI
////////////////////////////////////////////////////////

const railSound = document.getElementById("railSound");

function setupToggle(id,key){

    const buttons = document.querySelectorAll(`#${id} button`);

    buttons.forEach(btn=>{

        const value = btn.dataset.value;

        if(value === CONFIG[key]) btn.classList.add("active");

        btn.onclick = ()=>{

            buttons.forEach(b=>b.classList.remove("active"));
            btn.classList.add("active");

            if(key === "sound"){
                value === "on" ? railSound.play() : railSound.pause();
                return;
            }

            localStorage.setItem(key,value);
            location.reload();
        };
    });
}

setupToggle("soundToggle","sound");
setupToggle("curveToggle","curve");
setupToggle("cameraToggle","camera");


////////////////////////////////////////////////////////
//// SPEED UI
////////////////////////////////////////////////////////

const speedSlider = document.getElementById("speedSlider");
const speedValue  = document.getElementById("speedValue");

speedSlider.value = SPEED;
speedValue.textContent = SPEED.toFixed(1);

speedSlider.oninput = ()=>{
    SPEED = parseFloat(speedSlider.value);
    speedValue.textContent = SPEED.toFixed(1);
    localStorage.setItem("speed",speedSlider.value);
    location.reload();
};

railSound.pause();

////////////////////////////////////////////////////////
//// renderer
////////////////////////////////////////////////////////

const renderer = new THREE.WebGLRenderer({antialias: true});
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.xr.enabled = true;

document.body.appendChild(renderer.domElement);
document.body.appendChild(VRButton.createButton(renderer));

////////////////////////////////////////////////////////
//// scene
////////////////////////////////////////////////////////

const scene = new THREE.Scene();

////////////////////////////////////////////////////////
//// camera
////////////////////////////////////////////////////////

const camera = new THREE.PerspectiveCamera(50, window.innerWidth/window.innerHeight, 0.1, 1000);
let controls = null;

////////////////////////////////////////////////////////
//// curve
////////////////////////////////////////////////////////

class MyCurve extends Curve {

    getPointAt(t) {
        t *= Math.PI * 2;
        if (CONFIG.curve === "trolley") {
            const x = Math.sin(t * 3) * RAIL_RADIUS;
            const y = RAIL_HEIGHT;
            const z = Math.sin(t * 2) * RAIL_RADIUS * RAIL_OVAL;
            return this.vector.set(x, y, z);
        } else {
            const x = Math.sin(t * 3) * Math.cos(t * 4) * RAIL_RADIUS;
            const y = (Math.sin(t * 10) + Math.cos(t * 17)) * 0.4 * MODEL_SCALE + RAIL_HEIGHT;
            const z = Math.sin(t) * Math.sin(t * 4) * RAIL_RADIUS * RAIL_OVAL;
            return this.vector.set(x, y, z);
        }
    }
}

const curve = new MyCurve();

////////////////////////////////////////////////////////
//// coaster
////////////////////////////////////////////////////////

await addCoaster(scene, curve, null,
"https://www.city.echizen.lg.jp/office/030/021/open-data-echizen_d/fil/00101_kokufuhakkutsu.glb"
);

////////////////////////////////////////////////////////
//// 遺跡スケール変更
////////////////////////////////////////////////////////

let scaled = false;

scene.traverse((obj) => {
    if(obj.isMesh && !scaled){
        let root = obj;
        while(root.parent && root.parent.type !== "Scene"){
            root = root.parent;
        }
        root.scale.set(MODEL_SCALE,MODEL_SCALE,MODEL_SCALE);
        root.rotation.y = THREE.MathUtils.degToRad(20);
        scaled = true;
    }
});

////////////////////////////////////////////////////////
//// 出土品
////////////////////////////////////////////////////////

const loader = new GLTFLoader();

loader.load(
    "https://raw.githubusercontent.com/echizencity/opendata/main/kokufuhakkutsu2/model02_small.glb",
    (gltf)=>{
        const artifact = gltf.scene;
        artifact.scale.set(ARTIFACT_SCALE, ARTIFACT_SCALE, ARTIFACT_SCALE);
        artifact.position.set(0, ARTIFACT_HEIGHT, 0);
        scene.add(artifact);
    }
);

////////////////////////////////////////////////////////
//// 説明書
////////////////////////////////////////////////////////
const textureLoader = new THREE.TextureLoader();

textureLoader.load(
    "https://raw.githubusercontent.com/echizencity/opendata/main/kokufuhakkutsu/20400_kokufuhakkutsu.png",
    function(texture) {
        texture.colorSpace = THREE.SRGBColorSpace;
        const geometry = new THREE.PlaneGeometry(2 * MODEL_SCALE, 2 * MODEL_SCALE);
        const material = new THREE.MeshBasicMaterial({
            map: texture,
            transparent: true,
            toneMapped:false
        });
        const imagePlane = new THREE.Mesh(geometry, material);
        imagePlane.position.set(8 * MODEL_SCALE, 3 * MODEL_SCALE, 0);
        imagePlane.rotation.y = Math.PI * -0.5;
        scene.add(imagePlane);
    }
);

////////////////////////////////////////////////////////
//// train
////////////////////////////////////////////////////////

const geometry = new THREE.BoxGeometry(0.1 * MODEL_SCALE, 0.1 * MODEL_SCALE, 0.2 * MODEL_SCALE);
const material = new THREE.MeshBasicMaterial({color:15628151});

const train = new THREE.Mesh(geometry,material);
scene.add(train);

////////////////////////////////////////////////////////
//// camera mode
////////////////////////////////////////////////////////

if(CONFIG.camera === "ride"){
    train.add(camera);
    camera.position.set(0, 0.2 * MODEL_SCALE, 0);
}else{
    const controls = new OrbitControls(camera,renderer.domElement);
    controls.listenToKeyEvents(window);
    camera.position.set(0, 4 * MODEL_SCALE, 20 * MODEL_SCALE);
}

////////////////////////////////////////////////////////
//// motion variables
////////////////////////////////////////////////////////

const position = new THREE.Vector3();
const tangent = new THREE.Vector3();
const lookAt = new THREE.Vector3();

let velocity = 0.0001;
let progress = 0;
let prevTime = performance.now();

////////////////////////////////////////////////////////
//// animation
////////////////////////////////////////////////////////

renderer.setAnimationLoop(()=>{

    const time = performance.now();
    const delta = time - prevTime;

    progress += velocity;
    progress %= 1;

    position.copy(curve.getPointAt(progress));
    position.y += 0.2;

    train.position.copy(position);

    tangent.copy(curve.getTangentAt(progress));

    const vc = SPEED;

    velocity -= tangent.y * 1e-7 * delta * vc;

    const MIN_SPEED = 0.00004 * vc;
    const MAX_SPEED = 0.0002  * vc;

    velocity = Math.max(MIN_SPEED,Math.min(MAX_SPEED,velocity));

    train.lookAt(
        lookAt.copy(position).sub(tangent)
    );

    if(controls) controls.update();

    renderer.render(scene,camera);

    prevTime = time;

    ////////////////////////////////////////
    // sound
    ////////////////////////////////////////

    if(!railSound.paused){

        const speedRatio = velocity * 200 * MODEL_SCALE;

        railSound.volume = Math.min(1,speedRatio);

        const targetRate = 1 + speedRatio * 2;

        railSound.playbackRate +=
            (targetRate - railSound.playbackRate) * 0.05;
    }

});

////////////////////////////////////////////////////////
//// resize
////////////////////////////////////////////////////////

window.addEventListener("resize",()=>{
    camera.aspect = window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

</script>
</body>
</html>
